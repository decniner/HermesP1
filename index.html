<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>📎 Clippy — AI Assistant</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:radial-gradient(ellipse at center,#1a1a2e 0%,#0a0a15 100%);font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#fff;user-select:none;-webkit-user-select:none}
#container{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;touch-action:none}
#ui{position:fixed;bottom:0;left:0;right:0;z-index:10;pointer-events:none}
#bar{display:flex;gap:6px;padding:12px 12px 28px;align-items:center;pointer-events:auto;background:linear-gradient(transparent,rgba(10,10,21,.85) 40%)}
#input{flex:1;height:44px;border-radius:22px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);padding:0 18px;font-size:15px;color:#fff;outline:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#input:focus{border-color:rgba(108,99,255,.5)}
#input::placeholder{color:rgba(255,255,255,.3)}
#mic,#send{width:44px;height:44px;border-radius:50%;border:none;background:rgba(108,99,255,.2);color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center}
#mic:active,#send:active{transform:scale(.9)}
#mic.active{background:rgba(255,68,68,.4);animation:pulse 1s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,68,68,.4)}70%{box-shadow:0 0 0 12px transparent}to{box-shadow:0 0 0 0 transparent}}
#bubble-wrap{position:fixed;z-index:5;pointer-events:none;transition:opacity .3s;opacity:0}
#bubble-wrap.show{opacity:1}
#bubble{background:rgba(255,255,255,.12);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px 18px;font-size:14px;line-height:1.5;max-width:75vw;text-shadow:0 1px 3px rgba(0,0,0,.5);position:relative;margin:0}
#bubble::after{content:'';position:absolute;bottom:-8px;left:24px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid rgba(255,255,255,.12)}
#dot{position:fixed;top:16px;right:16px;z-index:20;width:10px;height:10px;border-radius:50%;background:#555;transition:background .3s}
#dot.on{background:#00c853;box-shadow:0 0 8px #00c853}
#dot.busy{background:#ffd600;animation:pulse 1.2s infinite}
#dot.err{background:#ff1744}
.hbtn{position:fixed;top:14px;left:14px;z-index:20;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#fff;padding:6px 12px;font-size:12px;cursor:pointer}
.hpanel{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);display:none;overflow-y:auto;padding:60px 20px 20px}
.hpanel.open{display:block}
.hpanel h2{font-size:18px;margin-bottom:16px;color:#6c63ff}
.hentry{margin-bottom:12px;background:rgba(255,255,255,.04);border-radius:10px;padding:12px}
.hentry .q{font-size:13px;color:#aaa;margin-bottom:4px}
.hentry .a{font-size:13px;color:#fff}
.hentry .t{font-size:10px;color:#555;margin-top:4px}
.chide{position:absolute;top:14px;right:16px;background:none;border:none;color:#fff;font-size:24px;cursor:pointer}
</style>
</head>
<body>

<div id="container"></div>
<div id="bubble-wrap"><div id="bubble"></div></div>
<div id="dot"></div>
<button class="hbtn" id="hbtn">📋</button>

<div id="ui">
  <div id="bar">
    <button id="cam">📷</button>
    <button id="mic">🎤</button>
    <input id="input" type="text" placeholder="Ask Clippy..." autocomplete="off">
    <button id="send">➤</button>
  </div>
</div>

<div class="hpanel" id="hpanel">
  <button class="chide" id="chide">&times;</button>
  <h2>💬 History</h2>
  <div id="hlist"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.168.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.168.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ═══ CONFIG ═══
const CONFIG = {
  wsUrl: 'wss://sure-coupon-organised-remainder.trycloudflare.com',
  roamSpeed: 0.3,
  roamRadius: 2.5,
};

// ═══ SCENE ═══
const container = document.getElementById('container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.6, 5.5);
camera.lookAt(0, 0.6, 0);

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

// CSS2D overlay for speech bubble
const labeler = new CSS2DRenderer();
labeler.setSize(window.innerWidth, window.innerHeight);
labeler.domElement.style.position = 'fixed';
labeler.domElement.style.top = '0';
labeler.domElement.style.left = '0';
labeler.domElement.style.pointerEvents = 'none';
labeler.domElement.style.zIndex = '1';
container.appendChild(labeler.domElement);

// Lighting
scene.add(new THREE.AmbientLight(0x404060, 0.6));
const mkLight = (c, p, i) => { const l = new THREE.DirectionalLight(c, i); l.position.set(p[0], p[1], p[2]); scene.add(l); };
mkLight(0xffffff, [3,5,4], 2);
mkLight(0x8888ff, [-3,1,2], 0.8);
mkLight(0xff8888, [0,0,-4], 0.4);
mkLight(0x6c63ff, [0,-1,3], 0.6);

// Ground glow
const ring = new THREE.Mesh(
  new THREE.RingGeometry(0.4, 0.7, 64),
  new THREE.MeshBasicMaterial({ color: 0x6c63ff, transparent: true, opacity: 0.12, side: THREE.DoubleSide })
);
ring.rotation.x = -Math.PI / 2;
ring.position.y = -0.25;
scene.add(ring);

// ═══ BUILD CLIPPY (procedural paperclip) ═══
let clippy, mixer, actions = {};
let currentEmotion = 'idle';
let roamTarget = new THREE.Vector3();
let roaming = true;
let isDragging = false;
let touchPos = { x: 0, y: 0 };
let bubbleObj = null; // CSS2D bubble element

function buildClippy() {
  const g = new THREE.Group();

  // ── Materials ──
  const white = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, metalness: 0.3, roughness: 0.2 });
  const whiteShiny = new THREE.MeshStandardMaterial({ color: 0xfafafa, metalness: 0.5, roughness: 0.1 });
  const dark = new THREE.MeshStandardMaterial({ color: 0x222222, metalness: 0.6, roughness: 0.3 });
  const blueGlow = new THREE.MeshStandardMaterial({ color: 0x88ddff, emissive: 0x44aaff, emissiveIntensity: 0.6 });
  const pinkAccent = new THREE.MeshStandardMaterial({ color: 0xffaaaa, metalness: 0.1, roughness: 0.5 });

  // ── Body ──
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.45, 24, 24), white);
  body.scale.set(1, 0.85, 0.9);
  body.position.y = 0.15;
  g.add(body);

  // Chest plate
  const chest = new THREE.Mesh(new THREE.SphereGeometry(0.3, 16, 16), whiteShiny);
  chest.scale.set(0.9, 0.7, 0.3);
  chest.position.set(0, 0.1, 0.4);
  g.add(chest);

  // ── Head ──
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 20, 20), white);
  head.scale.set(0.9, 0.8, 0.85);
  head.position.set(0, 0.6, 0.25);
  g.add(head);

  // Snout
  const snout = new THREE.Mesh(new THREE.SphereGeometry(0.15, 14, 14), white);
  snout.scale.set(0.8, 0.5, 0.6);
  snout.position.set(0, 0.5, 0.52);
  g.add(snout);

  // Nose
  const nose = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), dark);
  nose.position.set(0, 0.52, 0.6);
  g.add(nose);

  // ── Eyes ──
  const addEye = (x) => {
    const s = new THREE.Mesh(new THREE.SphereGeometry(0.08, 12, 12), dark);
    s.position.set(x, 0.66, 0.42);
    s.scale.set(1, 0.8, 0.5);
    g.add(s);
    const e = new THREE.Mesh(new THREE.SphereGeometry(0.055, 10, 10), blueGlow);
    e.position.set(x, 0.665, 0.46);
    e.scale.set(1, 0.9, 0.6);
    g.add(e);
    const dot = new THREE.Mesh(new THREE.SphereGeometry(0.02, 6, 6), new THREE.MeshBasicMaterial({ color: 0xffffff }));
    dot.position.set(x, 0.67, 0.48);
    g.add(dot);
  };
  addEye(-0.1);
  addEye(0.1);

  // ── Ears ──
  const earMat = new THREE.MeshStandardMaterial({ color: 0xe8d8d0, metalness: 0.1, roughness: 0.6 });
  const addEar = (x) => {
    const ear = new THREE.Mesh(new THREE.SphereGeometry(0.08, 10, 10), earMat);
    ear.position.set(x, 0.78, 0.25);
    ear.scale.set(0.7, 1.4, 0.4);
    g.add(ear);
  };
  addEar(-0.22);
  addEar(0.22);

  // ── Mouth (an LED line that animates when barking) ──
  const mouth = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.01, 0.02), new THREE.MeshBasicMaterial({ color: 0x88ddff, transparent: true, opacity: 0.6 }));
  mouth.position.set(0, 0.42, 0.56);
  mouth.name = 'mouth';
  g.add(mouth);

  // ── Legs ──
  const legMat = new THREE.MeshStandardMaterial({ color: 0xe8e8e8, metalness: 0.3, roughness: 0.25 });
  const addLeg = (x, z) => {
    const leg = new THREE.Mesh(new THREE.SphereGeometry(0.06, 8, 8), legMat);
    leg.position.set(x, -0.22, z);
    leg.scale.set(1, 0.9, 1.2);
    leg.name = `leg_${x}_${z}`;
    g.add(leg);
    return leg;
  };
  const fl = addLeg(-0.2, 0.15);
  const fr = addLeg(0.2, 0.15);
  const bl = addLeg(-0.2, -0.2);
  const br = addLeg(0.2, -0.2);

  // ── Tail ──
  const tailMat = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, metalness: 0.3, roughness: 0.2 });
  const tail = new THREE.Mesh(new THREE.CylinderGeometry(0.015, 0.025, 0.18, 6, 1, false), tailMat);
  tail.position.set(0, 0.25, -0.45);
  tail.rotation.x = 0.5;
  tail.name = 'tail';
  g.add(tail);
  // Tail tip
  const tip = new THREE.Mesh(new THREE.SphereGeometry(0.03, 8, 8), tailMat);
  tip.position.set(0, 0.35, -0.48);
  tip.name = 'tailTip';
  g.add(tip);

  // ── Collar ──
  const collar = new THREE.Mesh(new THREE.TorusGeometry(0.26, 0.02, 8, 20), pinkAccent);
  collar.position.set(0, 0.33, 0.1);
  collar.rotation.x = Math.PI / 3;
  g.add(collar);

  // Store animatable parts
  const _mouth = mouth;
  const _tail = tail;
  const _tailTip = tip;

  clippy = g;
  clippy.scale.set(0.7, 0.7, 0.7);
  clippy.position.set(0, -0.2, 0);
  scene.add(clippy);
  clippy.userData = { mouth: _mouth, tail: _tail, tailTip: _tailTip, legs: [fl, fr, bl, br] };

  // ── Speech bubble ──
  const div = document.createElement('div');
  div.id = 'bb';
  div.textContent = 'Hi!';
  div.style.cssText = 'background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:10px 14px;color:#fff;font-size:13px;line-height:1.4;max-width:220px;text-align:center;pointer-events:none;transition:opacity 0.3s;opacity:0;box-shadow:0 4px 20px rgba(0,0,0,0.3)';
  bubbleObj = new CSS2DObject(div);
  bubbleObj.position.set(0, 1.7, 0);
  clippy.add(bubbleObj);

  setTimeout(setRoamTarget, 500);
}

// ── Bubble helper ──
function showBubble(text, duration = 4000) {
  if (!bubbleObj) return;
  const el = bubbleObj.element;
  el.textContent = text;
  el.style.opacity = '1';
  clearTimeout(el._hide);
  el._hide = setTimeout(() => { el.style.opacity = '0'; }, duration);
}

// ── Emotion ──
let tailWagPhase = 0;

function triggerEmotion(emotion) {
  if (!clippy) return;
  currentEmotion = emotion;
  const scale = { happy: 1.1, celebrate: 1.15, curious: 1.02, thinking: 1.0, oops: 0.95, idle: 1.0 };
  const s = scale[emotion] || 1;
  clippy.scale.set(s, s, s);
  setTimeout(() => { if (clippy) clippy.scale.set(1, 1, 1); }, 300);
}

function emotionFromText(text) {
  const l = text.toLowerCase();
  if (l.includes('*tail wag*') || l.includes('*happy') || l.includes('yip') || l.includes('woof') || l.includes('excited') || l.includes('love') || l.includes('happy') || l.includes('🎉')) return 'happy';
  if (l.includes('*tilt') || l.includes('*whimper') || l.includes('?') || l.includes('curious') || l.includes('what') || l.includes('how') || l.includes('why')) return 'curious';
  if (l.includes('*yawn') || l.includes('*stretch') || l.includes('sleepy') || l.includes('tired')) return 'thinking';
  if (l.includes('*play') || l.includes('fetch') || l.includes('play') || l.includes('game')) return 'celebrate';
  if (l.includes('*growl') || l.includes('sorry') || l.includes('mistake') || l.includes('oops')) return 'oops';
  return 'happy';
}

// ═══ CLIPPY WALKING + SOUND ═══

let idleTime = 0;
let movePhase = 0;
let walkPhase = 0;
let isPausing = false;
let pauseTimer = 0;
let isSpeaking = false;
let speakPhase = 0;
let lastStep = 0;

// ── Footstep sound ──
let audioCtx = null;
function initAudio() {
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch {}
}
function playStep() {
  if (!audioCtx) return;
  try {
    const now = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(200 + Math.random() * 100, now);
    osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
    gain.gain.setValueAtTime(0.15, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(now);
    osc.stop(now + 0.12);
  } catch {}
}

initAudio();

function setRoamTarget() {
  if (!roaming) return;
  const a = Math.random() * Math.PI * 2;
  const d = 0.3 + Math.random() * (CONFIG.roamRadius * 0.7);
  roamTarget.set(Math.cos(a) * d, -0.1 + Math.random() * 0.3, Math.sin(a) * d * 0.6);
  isPausing = false;
}

function speakAnimate(on) {
  isSpeaking = on;
  if (on) speakPhase = 0;
  // When speaking, face camera (rotation.y = 0)
  if (on && clippy) {
    clippy.rotation.y = 0;
  }
}

function updateRoaming() {
  if (!clippy || isDragging) return;
  movePhase += 0.016;
  idleTime += 0.016;

  // ── Speaking animation ──
  if (isSpeaking) {
    speakPhase += 0.016;
    clippy.rotation.y = 0;
    clippy.position.y = -0.2 + Math.sin(speakPhase * 2.5) * 0.015;
    const mouthOpen = 0.5 + Math.sin(speakPhase * 14) * 0.3 + Math.sin(speakPhase * 22) * 0.15;
    if (clippy.userData.mouth) clippy.userData.mouth.scale.y = Math.max(0.3, mouthOpen);
    ring.position.x = clippy.position.x; ring.position.z = clippy.position.z;
    return;
  }

  const dist = clippy.position.distanceTo(roamTarget);

  // ── Pause at destination ──
  if (dist < 0.12 && !isPausing) {
    isPausing = true; pauseTimer = 0;
  }
  if (isPausing) {
    pauseTimer += 0.016;
    clippy.position.y = -0.2 + Math.sin(idleTime * 1.6) * 0.025;
    if (clippy.userData.mouth) clippy.userData.mouth.scale.y = 1;
    if (pauseTimer > 1.2 + Math.random() * 2) setRoamTarget();
    ring.position.x = clippy.position.x; ring.position.z = clippy.position.z;
    return;
  }

  // ── Float toward target ──
  const speed = 0.02 + Math.min(dist * 0.01, 0.025);
  const ease = dist < 0.5 ? speed * (2 - speed) : speed;
  clippy.position.x += (roamTarget.x - clippy.position.x) * ease;
  clippy.position.z += (roamTarget.z - clippy.position.z) * ease;
  clippy.position.y += (roamTarget.y - clippy.position.y) * ease * 0.3;

  // ── Tail wag (continuous when moving or idle) ──
  tailWagPhase += 0.12;
  if (clippy.userData.tail) {
    const wag = Math.sin(tailWagPhase * 2) * 0.6 + 0.3; // 0.3 to 0.9 range
    clippy.userData.tail.rotation.z = wag;
    clippy.userData.tailTip.position.x = Math.sin(tailWagPhase * 2) * 0.04;
  }

  // ── Gentle trot bob ──
  clippy.position.y += Math.sin(movePhase * 1.8) * 0.004;

  // ── Subtle body tilt ──
  clippy.rotation.z = Math.sin(movePhase * 0.5) * 0.015;
  clippy.rotation.x = Math.cos(movePhase * 0.3) * 0.008;

  // ── Face direction of travel ──
  const dirX = roamTarget.x - clippy.position.x;
  const dirZ = roamTarget.z - clippy.position.z;
  if (Math.abs(dirX) > 0.01 || Math.abs(dirZ) > 0.01) {
    const targetAngle = Math.atan2(dirX, dirZ);
    let diff = targetAngle - clippy.rotation.y;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    clippy.rotation.y += diff * 0.03;
  }

  // ── Reset mouth ──
  if (clippy.userData.mouth) clippy.userData.mouth.scale.y = 1;

  // ── Glow ring follows ──
  ring.position.x = clippy.position.x; ring.position.z = clippy.position.z;
}

// ═══ TOUCH / DRAG ═══
renderer.domElement.addEventListener('touchstart', (e) => {
  touchPos.x = e.touches[0].clientX; touchPos.y = e.touches[0].clientY;
}, { passive: true });
renderer.domElement.addEventListener('touchmove', (e) => {
  if (!clippy) return;
  isDragging = true;
  const dx = (e.touches[0].clientX - touchPos.x) / window.innerWidth * 4;
  const dy = -(e.touches[0].clientY - touchPos.y) / window.innerHeight * 3;
  clippy.position.x += dx; clippy.position.y = Math.max(-0.4, clippy.position.y + dy); clippy.position.z += dx * 0.5;
  ring.position.x = clippy.position.x; ring.position.z = clippy.position.z;
  touchPos.x = e.touches[0].clientX; touchPos.y = e.touches[0].clientY;
}, { passive: true });
renderer.domElement.addEventListener('touchend', () => {
  if (isDragging) { isDragging = false; setRoamTarget(); }
  else triggerEmotion(['happy','curious','celebrate'][Math.random() * 3 | 0]);
}, { passive: true });

renderer.domElement.addEventListener('mousedown', (e) => { touchPos.x = e.clientX; touchPos.y = e.clientY; });
renderer.domElement.addEventListener('mousemove', (e) => {
  if (e.buttons !== 1 || !clippy) return;
  isDragging = true;
  const dx = (e.clientX - touchPos.x) / window.innerWidth * 4;
  const dy = -(e.clientY - touchPos.y) / window.innerHeight * 3;
  clippy.position.x += dx; clippy.position.y = Math.max(-0.5, clippy.position.y + dy);
  ring.position.x = clippy.position.x; ring.position.z = clippy.position.z;
  touchPos.x = e.clientX; touchPos.y = e.clientY;
});
renderer.domElement.addEventListener('mouseup', () => {
  if (isDragging) { isDragging = false; setRoamTarget(); }
  else triggerEmotion(['happy','curious','celebrate'][Math.random() * 3 | 0]);
});

// ═══ WEBSOCKET ═══
let ws = null;
const dot = document.getElementById('dot');

function connect() {
  ws = new WebSocket(CONFIG.wsUrl);
  ws.onopen = () => { dot.className = 'on'; showBubble('✨ Hi! I\'m Clippy!', 2000); };
  ws.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'clippy_message' && d.text) {
        speak(d.text);
        emotionFromText(d.text);
        showBubble(stripEmoji(d.text), 6000);
        save('ai', d.text);
      }
    } catch {}
  };
  ws.onclose = () => { dot.className = 'err'; setTimeout(connect, 3000); };
  ws.onerror = () => { dot.className = 'err'; };
}

function send(t) {
  if (!t || !ws || ws.readyState !== WebSocket.OPEN) { showBubble('⚠️ Not connected...', 2000); return; }
  ws.send(JSON.stringify({ type: 'user_message', text: t }));
  dot.className = 'busy';
  save('me', t);
}

function stripEmoji(t) { return t.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E0}-\u{1F1FF}\u{1F900}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu,'').trim(); }

// ═══ SPEECH ═══
let rec = null;
const mic = document.getElementById('mic');
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  rec = new SR(); rec.lang = 'en-US'; rec.interimResults = false; rec.continuous = false;
  rec.onresult = (e) => { const t = e.results[0][0].transcript; document.getElementById('input').value = t; sendMe(); }; // tricky: correct ref below
  rec.onend = () => mic.classList.remove('active');
  rec.onerror = () => mic.classList.remove('active');
}
mic.addEventListener('click', () => {
  if (!rec) return;
  if (mic.classList.contains('active')) { mic.classList.remove('active'); rec.stop(); }
  else { mic.classList.add('active'); rec.start(); }
});

function speak(t) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(t.replace(/[📎✨😊🎉🤔😅🤨⚠️📷]/g,'').trim());
  u.rate = 1.0; u.pitch = 1.3; u.volume = 1;
  u.onstart = () => { dot.className = 'busy'; speakAnimate(true); };
  u.onend = () => { dot.className = 'on'; speakAnimate(false); };
  window.speechSynthesis.speak(u);
}

// ═══ CAMERA ═══
let camStream = null;
let camActive = false;
const camBtn = document.getElementById('cam');
const camVideo = document.createElement('video');
camVideo.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover;z-index:2;opacity:0;transition:opacity .4s;pointer-events:none';
camVideo.setAttribute('playsinline','');
camVideo.setAttribute('autoplay','');
container.appendChild(camVideo);

camBtn.addEventListener('click', async () => {
  if (camActive) { camBtn.style.background = 'rgba(108,99,255,.2)'; camBtn.textContent = '📷'; hideCam(); return; }
  camBtn.textContent = '⏳';
  try {
    camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }, audio: false });
    camVideo.srcObject = camStream;
    camVideo.style.opacity = '0.3';
    await camVideo.play();
    showBubble('📷 Say cheese! Tap 📷 again to capture what I see.', 3000);
    camBtn.style.background = 'rgba(255,68,68,.4)';
    camBtn.textContent = '📸';
    camActive = true;
  } catch (e) {
    showBubble('📷 Camera access denied! Check permissions.', 2500);
    camBtn.textContent = '📷';
  }
});

function hideCam() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  camVideo.style.opacity = '0';
  camActive = false;
}

function captureAndSend() {
  if (!camStream) { showBubble('📷 Tap 📷 first to open camera!', 2000); return; }
  const c = document.createElement('canvas');
  c.width = camVideo.videoWidth || 640;
  c.height = camVideo.videoHeight || 480;
  const ctx = c.getContext('2d');
  ctx.drawImage(camVideo, 0, 0);
  const b64 = c.toDataURL('image/jpeg', 0.6).split(',')[1];
  hideCam();
  camBtn.textContent = '📷';
  camBtn.style.background = 'rgba(108,99,255,.2)';
  showBubble('📷 Clippy is looking...', 3000);
  dot.className = 'busy';
  ws.send(JSON.stringify({ type: 'camera_image', image: b64 }));
}

// Tap the camera preview to capture
camVideo.addEventListener('click', captureAndSend);
// Or long-press the cam button to capture
camBtn.addEventListener('dblclick', captureAndSend);

// ═══ UI ═══
const input = document.getElementById('input');
function sendMe() {
  const t = input.value.trim();
  if (!t) return;
  send(t);
  input.value = '';
}
document.getElementById('send').addEventListener('click', sendMe);
input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMe(); });

// ═══ HISTORY ═══
function save(r, t) {
  try {
    const h = JSON.parse(localStorage.getItem('ch') || '[]');
    h.push({ r, t, time: Date.now() });
    if (h.length > 100) h.splice(0, h.length - 100);
    localStorage.setItem('ch', JSON.stringify(h));
  } catch {}
}
document.getElementById('hbtn').addEventListener('click', () => {
  const p = document.getElementById('hpanel');
  const h = JSON.parse(localStorage.getItem('ch') || '[]');
  document.getElementById('hlist').innerHTML = h.reverse().map(e => `
    <div class="hentry"><div class="q">${e.r === 'me' ? '🧑' : '📎'}</div><div class="a">${e.t.substring(0, 200)}</div><div class="t">${new Date(e.time).toLocaleString()}</div></div>
  `).join('');
  p.classList.add('open');
});
document.getElementById('chide').addEventListener('click', () => document.getElementById('hpanel').classList.remove('open'));

// ═══ RESIZE ═══
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labeler.setSize(window.innerWidth, window.innerHeight);
});

// ═══ ANIMATE ═══
function animate() {
  requestAnimationFrame(animate);
  if (mixer) mixer.update(0.016);
  updateRoaming();
  renderer.render(scene, camera);
  labeler.render(scene, camera);
}

// ═══ INIT ═══
buildClippy();
connect();
animate();
console.log('📎 Clippy loaded!');
</script>
</body>
