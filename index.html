<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>⚪ BB-8 — Astromech Droid</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:radial-gradient(ellipse at center,#1a1a2e 0%,#0a0a15 100%);font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#fff;user-select:none;-webkit-user-select:none}
#container{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;touch-action:none}
#ui{position:fixed;bottom:0;left:0;right:0;z-index:10;pointer-events:none}
#bar{display:flex;gap:6px;padding:12px 12px 28px;align-items:center;pointer-events:auto;background:linear-gradient(transparent,rgba(10,10,21,.85) 40%)}
#input{flex:1;height:44px;border-radius:22px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);padding:0 18px;font-size:15px;color:#fff;outline:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}
#input:focus{border-color:rgba(108,99,255,.5)}
#input::placeholder{color:rgba(255,255,255,.3)}
#mic,#send{width:44px;height:44px;border-radius:50%;border:none;background:rgba(108,99,255,.2);color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center}
#mic:active,#send:active{transform:scale(.9)}
#mic.active{background:rgba(255,68,68,.4);animation:pulse 1s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,68,68,.4)}70%{box-shadow:0 0 0 12px transparent}to{box-shadow:0 0 0 0 transparent}}
#bubble-wrap{position:fixed;z-index:5;pointer-events:none;transition:opacity .3s;opacity:0}
#bubble-wrap.show{opacity:1}
#bubble{background:rgba(255,255,255,.12);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px 18px;font-size:14px;line-height:1.5;max-width:75vw;text-shadow:0 1px 3px rgba(0,0,0,.5);position:relative;margin:0}
#bubble::after{content:'';position:absolute;bottom:-8px;left:24px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid rgba(255,255,255,.12)}
#dot{position:fixed;top:16px;right:16px;z-index:20;width:10px;height:10px;border-radius:50%;background:#555;transition:background .3s}
#dot.on{background:#00c853;box-shadow:0 0 8px #00c853}
#dot.busy{background:#ffd600;animation:pulse 1.2s infinite}
#dot.err{background:#ff1744}
.hbtn{position:fixed;top:14px;left:14px;z-index:20;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#fff;padding:6px 12px;font-size:12px;cursor:pointer}
.hpanel{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);display:none;overflow-y:auto;padding:60px 20px 20px}
.hpanel.open{display:block}
.hpanel h2{font-size:18px;margin-bottom:16px;color:#6c63ff}
.hentry{margin-bottom:12px;background:rgba(255,255,255,.04);border-radius:10px;padding:12px}

<script type="importmap">
{

<script type="module">
import * as THREE from 'three';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ═══ CONFIG ═══
const CONFIG = {
  wsUrl: 'wss://plots-pontiac-breach-sciences.trycloudflare.com',
  roamSpeed: 0.3,
  roamRadius: 2.5,
};

// ═══ SCENE ═══
const container = document.getElementById('container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.6, 5.5);
camera.lookAt(0, 0.6, 0);

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

// CSS2D overlay for speech bubble
const labeler = new CSS2DRenderer();
labeler.setSize(window.innerWidth, window.innerHeight);
labeler.domElement.style.position = 'fixed';
labeler.domElement.style.top = '0';
labeler.domElement.style.left = '0';
labeler.domElement.style.pointerEvents = 'none';
labeler.domElement.style.zIndex = '1';
container.appendChild(labeler.domElement);

// Lighting
scene.add(new THREE.AmbientLight(0x404060, 0.6));
const mkLight = (c, p, i) => { const l = new THREE.DirectionalLight(c, i); l.position.set(p[0], p[1], p[2]); scene.add(l); };
mkLight(0xffffff, [3,5,4], 2);
mkLight(0x8888ff, [-3,1,2], 0.8);
mkLight(0xff8888, [0,0,-4], 0.4);
mkLight(0x6c63ff, [0,-1,3], 0.6);

// Ground glow
const ring = new THREE.Mesh(
  new THREE.RingGeometry(0.4, 0.7, 64),
  new THREE.MeshBasicMaterial({ color: 0x6c63ff, transparent: true, opacity: 0.12, side: THREE.DoubleSide })
);
ring.rotation.x = -Math.PI / 2;
ring.position.y = -0.3;
scene.add(ring);

// ═══ BUILD CLIPPY (procedural paperclip) ═══
let clippy, mixer, actions = {};
let currentEmotion = 'idle';
let roamTarget = new THREE.Vector3();
let roaming = true;
let isDragging = false;
let touchPos = { x: 0, y: 0 };
let bubbleObj = null; // CSS2D bubble element

function buildClippy() {
  const g = new THREE.Group();

  // ── Generate seamless BB-8 body texture ──
  function makeBodyTexture() {
    const c = document.createElement('canvas');
    c.width = 512; c.height = 256;
    const ctx = c.getContext('2d');

    // Base: space black
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, 512, 256);

    // Dark grey panel bands (subtle against black)
    ctx.fillStyle = '#2a2a2a';
    ctx.beginPath();
    ctx.ellipse(256, 180, 130, 50, 0, 0, Math.PI * 2);
    ctx.fill();

    // Left dark grey circle
    ctx.beginPath();
    ctx.ellipse(90, 130, 45, 55, 0, 0, Math.PI * 2);
    ctx.fill();

    // Right dark grey area
    ctx.beginPath();
    ctx.ellipse(420, 130, 35, 45, 0, 0, Math.PI * 2);
    ctx.fill();

    // Bottom dark grey sweep
    ctx.beginPath();
    ctx.ellipse(256, 200, 150, 30, 0, 0, Math.PI * 2);
    ctx.fill();

    // Silver panel on left (inside left orange circle)
    ctx.fillStyle = '#bbbbbb';
    ctx.beginPath();
    ctx.ellipse(90, 132, 22, 32, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Silver panel on right
    ctx.beginPath();
    ctx.ellipse(422, 130, 18, 28, -0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();

    // Bottom vents (horizontal slats)
    ctx.fillStyle = '#888';
    ctx.fillRect(200, 200, 60, 6);
    ctx.fillRect(200, 210, 55, 4);

    // Equator line
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, 128);
    ctx.lineTo(512, 128);
    ctx.stroke();

    // Vertical seam line
    ctx.beginPath();
    ctx.moveTo(80, 0);
    ctx.lineTo(80, 256);
    ctx.stroke();

    // Bolt dots
    ctx.fillStyle = '#888';
    const boltPositions = [
      [50, 100], [150, 90], [300, 85], [400, 95], [470, 110], [30, 150]
    ];
    boltPositions.forEach(([bx, by]) => {
      ctx.beginPath();
      ctx.arc(bx, by, 4, 0, Math.PI * 2);
      ctx.fill();
    });

    // Orange head stripes area (will be on separate head texture but paint faint guides)
    return new THREE.CanvasTexture(c);
  }

  // ── Generate seamless head dome texture ──
  function makeHeadTexture() {
    const c = document.createElement('canvas');
    c.width = 256; c.height = 128;
    const ctx = c.getContext('2d');

    // Base: space black
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(0, 0, 256, 128);

    // Horizontal dark grey stripe
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(50, 38, 50, 6);

    // Three vertical dark grey stripes
    ctx.fillRect(160, 20, 5, 25);
    ctx.fillRect(172, 20, 5, 25);
    ctx.fillRect(184, 20, 5, 25);

    // Top sensor area
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath();
    ctx.ellipse(128, 10, 40, 8, 0, 0, Math.PI * 2);
    ctx.fill();

    return new THREE.CanvasTexture(c);
  }

  // ── Body sphere with seamless texture ──
  const bodyTex = makeBodyTexture();
  const bodyMat = new THREE.MeshStandardMaterial({ map: bodyTex, roughness: 0.15, metalness: 0.5 });
  const bodySphere = new THREE.Mesh(new THREE.SphereGeometry(0.48, 36, 36), bodyMat);
  bodySphere.position.y = 0.02;
  bodySphere.name = 'bodySphere';
  g.add(bodySphere);

  // ── Head dome with seamless texture ──
  const headTex = makeHeadTexture();
  const headMat = new THREE.MeshStandardMaterial({ map: headTex, roughness: 0.15, metalness: 0.5 });
  const headDome = new THREE.Mesh(new THREE.SphereGeometry(0.28, 28, 28, 0, Math.PI * 2, 0, Math.PI / 1.9), headMat);
  headDome.position.set(0, 0.45, 0.02);
  headDome.name = 'headDome';
  g.add(headDome);

  // Head rim (silver ring, flush)
  const rim = new THREE.Mesh(new THREE.TorusGeometry(0.27, 0.01, 8, 32), new THREE.MeshStandardMaterial({ color: 0xbbbbbb, metalness: 0.8, roughness: 0.15 }));
  rim.position.set(0, 0.32, 0.02);
  g.add(rim);

  // ── Eyes (black spheres, flush on surface) ──
  const eyeBlack = new THREE.MeshBasicMaterial({ color: 0x00ccff });
  const silver = new THREE.MeshStandardMaterial({ color: 0xbbbbbb, metalness: 0.8, roughness: 0.15 });

  // Left eye (slightly larger, higher)
  const eL = new THREE.Mesh(new THREE.SphereGeometry(0.09, 14, 14), eyeBlack);
  eL.position.set(-0.13, 0.52, 0.26);
  eL.scale.set(1, 0.85, 0.4);
  g.add(eL);
  const rL = new THREE.Mesh(new THREE.TorusGeometry(0.085, 0.012, 8, 16), silver);
  rL.position.set(-0.13, 0.52, 0.28);
  g.add(rL);

  // Right eye (smaller, lower)
  const eR = new THREE.Mesh(new THREE.SphereGeometry(0.065, 14, 14), eyeBlack);
  eR.position.set(0.18, 0.44, 0.26);
  eR.scale.set(1, 0.85, 0.4);
  g.add(eR);
  const rR = new THREE.Mesh(new THREE.TorusGeometry(0.06, 0.01, 8, 16), silver);
  rR.position.set(0.18, 0.44, 0.28);
  g.add(rR);

  // Small rectangle below left eye
  const rect = new THREE.Mesh(new THREE.BoxGeometry(0.035, 0.02, 0.005), silver);
  rect.position.set(-0.13, 0.45, 0.28);
  g.add(rect);

  // ── Antenna on top ──
  const antennaGroup = new THREE.Group();
  antennaGroup.position.set(0, 0.68, -0.04);
  antennaGroup.name = 'antenna';
  const antBase = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.012, 0.15, 6), new THREE.MeshStandardMaterial({ color: 0x111111 }));
  antBase.position.y = 0.075;
  antennaGroup.add(antBase);
  const antTip = new THREE.Mesh(new THREE.SphereGeometry(0.018, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffffff }));
  antTip.position.y = 0.16;
  antTip.name = 'antennaLight';
  antennaGroup.add(antTip);
  g.add(antennaGroup);

  // Store references
  const _antennaLight = antTip;
  const _antennaGroup = antennaGroup;
  const _bodySphere = bodySphere;
  const _headDome = headDome;

  clippy = g;
  clippy.scale.set(0.6, 0.6, 0.6);
  clippy.position.set(0, -0.05, 0);
  scene.add(clippy);
  clippy.userData = { mouth: null, tail: null, tailTip: null, legs: [], antennaLight: _antennaLight, antennaGroup: _antennaGroup, bodySphere: _bodySphere, headDome: _headDome };

  // ── Speech bubble ──
  const div = document.createElement('div');
  div.id = 'bb';
  div.textContent = 'Hi!';
  div.style.cssText = 'background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:10px 14px;color:#fff;font-size:13px;line-height:1.4;max-width:220px;text-align:center;pointer-events:none;transition:opacity 0.3s;opacity:0;box-shadow:0 4px 20px rgba(0,0,0,0.3)';
  bubbleObj = new CSS2DObject(div);
  bubbleObj.position.set(0, 1.7, 0);
  clippy.add(bubbleObj);

  setTimeout(setRoamTarget, 500);
}

// ── Bubble helper ──
function showBubble(text) {
  if (!bubbleObj) return;
  const el = bubbleObj.element;
  el.textContent = text;
  el.style.opacity = '1';
  clearTimeout(el._hide);
}

function clearBubble() {
  if (!bubbleObj) return;
  const el = bubbleObj.element;
  el.style.opacity = '0';
}

// ── Emotion ──
let tailWagPhase = 0;

function triggerEmotion(emotion) {
  if (!clippy) return;
  currentEmotion = emotion;
  const scale = { happy: 1.1, celebrate: 1.15, curious: 1.02, thinking: 1.0, oops: 0.95, idle: 1.0 };
  const s = scale[emotion] || 1;
  clippy.scale.set(s, s, s);
  setTimeout(() => { if (clippy) clippy.scale.set(1, 1, 1); }, 300);
}

function emotionFromText(text) {
  const l = text.toLowerCase();
  if (l.includes('whistle') || l.includes('chirp') || l.includes('bleep') || l.includes('happy') || l.includes('scan') || l.includes('operational') || l.includes('beep') || l.includes('!')) return 'happy';
  if (l.includes('sassy') || l.includes('warble') || l.includes('disagree') || l.includes('grumpy') || l.includes('annoyed')) return 'curious';
  if (l.includes('calculating') || l.includes('processing') || l.includes('query') || l.includes('think') || l.includes('?') || l.includes('analyze')) return 'thinking';
  if (l.includes('panic') || l.includes('scream') || l.includes('danger') || l.includes('alert') || l.includes('emergency') || l.includes('help')) return 'oops';
  if (l.includes('heroic') || l.includes('mission') || l.includes('complete') || l.includes('saved') || l.includes('success')) return 'celebrate';
  return 'happy';
}

// ═══ CLIPPY WALKING + SOUND ═══

let idleTime = 0;
let movePhase = 0;
let walkPhase = 0;
let isPausing = false;
let pauseTimer = 0;
let isSpeaking = false;
let speakPhase = 0;
let lastStep = 0;
let _bounds = { left: -1.5, right: 1.5, top: 1.0, bottom: -0.8 };
let roamCooldown = 0;

// Recalculate visible bounds when screen resizes
function updateBounds() {
  const vFov = camera.fov * Math.PI / 180;
  const dist = Math.abs(camera.position.z);
  const height = 2 * Math.tan(vFov / 2) * dist;
  const width = height * camera.aspect;
  _bounds = {
    left: -width * 0.35,
    right: width * 0.35,
    top: height * 0.35,
    bottom: -height * 0.25,
  };
}

function clampVec(v) {
  v.x = Math.max(_bounds.left, Math.min(_bounds.right, v.x));
  v.y = Math.max(_bounds.bottom, Math.min(_bounds.top, v.y));
}

// ── BB-8 Astromech Chirp & Whistle Sound Generator ──
function playBB8Sound(textLength = 10) {
  let audioCtx;
  try { 
    audioCtx = new (window.AudioContext || window.webkitAudioContext)(); 
  } catch { return; }
  if (!audioCtx) return;

  const totalChirps = Math.min(Math.max(textLength, 4), 18); // Dynamic chirp count
  let delayAcc = 0;

  for (let i = 0; i < totalChirps; i++) {
    // BB-8 uses organic spacing — not too fast
    const stepDelay = 120 + Math.random() * 120; // 120ms - 240ms spacing
    delayAcc += stepDelay;

    setTimeout(() => {
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();

        // BB-8 is high-pitched: 1200Hz up to 5500Hz
        const baseFreq = 1200 + Math.random() * 3800;
        const now = audioCtx.currentTime;
        const duration = 0.1 + Math.random() * 0.12; // 100-220ms bursts

        osc.type = 'sine'; // Crisp whistle tone

        // BB-8 Pitch Sweeps: Rapid bends and double-ramps
        const sweepType = Math.floor(Math.random() * 4);
        osc.frequency.setValueAtTime(baseFreq, now);

        if (sweepType === 0) {
          // Rapid upward chirp
          osc.frequency.exponentialRampToValueAtTime(Math.min(baseFreq * 1.8, 6000), now + duration);
        } else if (sweepType === 1) {
          // Rapid downward bleep
          osc.frequency.exponentialRampToValueAtTime(Math.max(baseFreq * 0.4, 600), now + duration);
        } else if (sweepType === 2) {
          // Bouncy warble (Up then down)
          osc.frequency.linearRampToValueAtTime(Math.min(baseFreq * 1.5, 5500), now + (duration * 0.5));
          osc.frequency.linearRampToValueAtTime(Math.max(baseFreq * 0.6, 800), now + duration);
        } else {
          // Rapid vibrato frequency wobble
          const vibratoSpeed = 25;
          for (let v = 0; v < duration; v += 0.015) {
            const freqOffset = (v % 0.03 < 0.015 ? 300 : -300);
            osc.frequency.setValueAtTime(Math.min(Math.max(baseFreq + freqOffset, 800), 5500), now + v);
          }
        }

        // Fast attack & soft fade volume envelope
        gain.gain.setValueAtTime(0.01, now);
        gain.gain.linearRampToValueAtTime(0.18, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, now + duration);

        osc.connect(gain);
        gain.connect(audioCtx.destination);

        osc.start(now);
        osc.stop(now + duration);
      } catch {}
    }, delayAcc);
  }
}

function setRoamTarget() {
  if (!roaming) return;
  // Very subtle movement — barely budge from center
  const a = Math.random() * Math.PI * 2;
  const d = 0.05 + Math.random() * 0.2; // Tiny distance: 0.05 to 0.25
  roamTarget.set(Math.cos(a) * d, -0.05 + Math.random() * 0.1, Math.sin(a) * d * 0.3);
  clampVec(roamTarget);
  isPausing = false;
}

function speakAnimate(on) {
  isSpeaking = on;
  if (on) speakPhase = 0;
  // When speaking, face camera (rotation.y = 0)
  if (on && clippy) {
    clippy.rotation.y = 0;
  }
}

function updateRoaming() {
  if (!clippy || isDragging) return;
  movePhase += 0.016;
  idleTime += 0.016;

  // ── Speaking animation ──
  if (isSpeaking) {
    speakPhase += 0.016;
    clippy.rotation.y = 0;
    clippy.position.y = -0.2 + Math.sin(speakPhase * 2.5) * 0.015;
    const mouthOpen = 0.5 + Math.sin(speakPhase * 14) * 0.3 + Math.sin(speakPhase * 22) * 0.15;
    if (clippy.userData.mouth) clippy.userData.mouth.scale.y = Math.max(0.3, mouthOpen);
    clampVec(clippy.position);
    ring.position.x = clippy.position.x; ring.position.z = clippy.position.z;
    return;
  }

  const dist = clippy.position.distanceTo(roamTarget);

  // ── Pause at destination ──
  if (dist < 0.12 && !isPausing) {
    isPausing = true; pauseTimer = 0;
  }
  if (isPausing) {
    pauseTimer += 0.016;
    clippy.position.y = -0.2 + Math.sin(idleTime * 1.6) * 0.025;
    if (clippy.userData.mouth) clippy.userData.mouth.scale.y = 1;
    if (pauseTimer > 5 + Math.random() * 4) setRoamTarget();
    ring.position.x = clippy.position.x; ring.position.z = clippy.position.z;
    return;
  }

  // ── Float toward target ──
  const speed = 0.02 + Math.min(dist * 0.01, 0.025);
  const ease = dist < 0.5 ? speed * (2 - speed) : speed;
  clippy.position.x += (roamTarget.x - clippy.position.x) * ease;
  clippy.position.z += (roamTarget.z - clippy.position.z) * ease;
  clippy.position.y += (roamTarget.y - clippy.position.y) * ease * 0.3;

  // ── BB-8 body roll (sphere rolls, head stays upright) ──
  if (clippy.userData.bodySphere && clippy.userData.headDome) {
    const body = clippy.userData.bodySphere;
    const head = clippy.userData.headDome;
    // Body rolls in direction of travel on Z axis
    const rollSpeed = movePhase * 2.5;
    body.rotation.z = Math.sin(rollSpeed) * 0.3;
    body.rotation.x = Math.cos(rollSpeed) * 0.25;
    // Head counter-rolls slightly to stay upright (BB-8 effect)
    head.rotation.z = -body.rotation.z * 0.6;
    head.rotation.x = -body.rotation.x * 0.5;
  }

  // ── Face direction of travel ──
  const dirX = roamTarget.x - clippy.position.x;
  const dirZ = roamTarget.z - clippy.position.z;
  if (Math.abs(dirX) > 0.01 || Math.abs(dirZ) > 0.01) {
    const targetAngle = Math.atan2(dirX, dirZ);
    let diff = targetAngle - clippy.rotation.y;
    while (diff > Math.PI) diff -= Math.PI * 2;
    while (diff < -Math.PI) diff += Math.PI * 2;
    clippy.rotation.y += diff * 0.03;
  }

  // ── Reset mouth ──
  if (clippy.userData.mouth) clippy.userData.mouth.scale.y = 1;

  // ── Clamp to screen bounds ──
  clampVec(clippy.position);

  // ── Glow ring follows ──
  ring.position.x = clippy.position.x; ring.position.z = clippy.position.z;
}

// ═══ TOUCH / DRAG ═══
renderer.domElement.addEventListener('touchstart', (e) => {
  touchPos.x = e.touches[0].clientX; touchPos.y = e.touches[0].clientY;
}, { passive: true });
renderer.domElement.addEventListener('touchmove', (e) => {
  if (!clippy) return;
  isDragging = true;
  const dx = (e.touches[0].clientX - touchPos.x) / window.innerWidth * 4;
  const dy = -(e.touches[0].clientY - touchPos.y) / window.innerHeight * 3;
  clippy.position.x += dx; clippy.position.y = Math.max(-0.2, clippy.position.y + dy); clippy.position.z += dx * 0.5;
  clampVec(clippy.position);
  ring.position.x = clippy.position.x; ring.position.z = clippy.position.z;
  touchPos.x = e.touches[0].clientX; touchPos.y = e.touches[0].clientY;
}, { passive: true });
// ── Tap BB-8 for random mood sound ──
const moods = ['happy', 'curious', 'celebrate', 'playful'];
function tapBB8Sound() {
  const mood = moods[Math.random() * moods.length | 0];
  const freqMin = mood === 'happy' ? 1500 : mood === 'playful' ? 2000 : mood === 'curious' ? 800 : 1200;
  const freqMax = mood === 'happy' ? 5000 : mood === 'playful' ? 5500 : mood === 'curious' ? 3000 : 4500;
  const spacing = mood === 'playful' ? 40 : mood === 'happy' ? 60 : mood === 'curious' ? 90 : 70;
  const count = 3 + Math.random() * 5 | 0;
  playBB8SoundCustom(freqMin, freqMax, spacing, count);
}

function playBB8SoundCustom(freqMin, freqMax, spacing, count) {
  let audioCtx;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch { return; }
  if (!audioCtx) return;
  let delay = 0;
  for (let i = 0; i < count; i++) {
    delay += spacing + Math.random() * 20;
    setTimeout(() => {
      try {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const now = audioCtx.currentTime;
        const freq = freqMin + Math.random() * (freqMax - freqMin);
        const dur = spacing / 1000 + 0.03;
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, now);
        osc.frequency.exponentialRampToValueAtTime(Math.max(200, freq * (Math.random() > 0.5 ? 1.5 : 0.5)), now + dur);
        gain.gain.setValueAtTime(0.01, now);
        gain.gain.linearRampToValueAtTime(0.15, now + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + dur);
      } catch {}
    }, delay);
  }
}

renderer.domElement.addEventListener('touchend', () => {
  if (isDragging) { isDragging = false; setRoamTarget(); }
  else { triggerEmotion(['happy','curious','celebrate'][Math.random() * 3 | 0]); tapBB8Sound(); }
}, { passive: true });

renderer.domElement.addEventListener('mousedown', (e) => { touchPos.x = e.clientX; touchPos.y = e.clientY; });
renderer.domElement.addEventListener('mousemove', (e) => {
  if (e.buttons !== 1 || !clippy) return;
  isDragging = true;
  const dx = (e.clientX - touchPos.x) / window.innerWidth * 4;
  const dy = -(e.clientY - touchPos.y) / window.innerHeight * 3;
  clippy.position.x += dx; clippy.position.y = Math.max(-0.5, clippy.position.y + dy);
  ring.position.x = clippy.position.x; ring.position.z = clippy.position.z;
  touchPos.x = e.clientX; touchPos.y = e.clientY;
});
renderer.domElement.addEventListener('mouseup', () => {
  if (isDragging) { isDragging = false; setRoamTarget(); }
  else { triggerEmotion(['happy','curious','celebrate'][Math.random() * 3 | 0]); tapBB8Sound(); }
});

// ═══ WEBSOCKET ═══
let ws = null;
const dot = document.getElementById('dot');

function connect() {
  ws = new WebSocket(CONFIG.wsUrl);
  ws.onopen = () => { dot.className = 'on'; showBubble('✨ Beep boop! BB-8 unit online!'); };
  ws.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data);
      if (d.type === 'clippy_message' && d.text) {
        speak(d.text);
        emotionFromText(d.text);
        showBubble(stripEmoji(d.text));
        save('ai', d.text);
      }
    } catch {}
  };
  ws.onclose = () => { dot.className = 'err'; setTimeout(connect, 3000); };
  ws.onerror = () => { dot.className = 'err'; };
}

function send(t) {
  if (!t || !ws || ws.readyState !== WebSocket.OPEN) { showBubble('⚠️ Not connected...'); return; }
  clearBubble();
  resetInactivityTimer();

  // ── Voice commands ──
  const lower = t.toLowerCase();
  if (lower.includes('roll buddy') || lower.includes('roll') && lower.includes('buddy')) {
    showBubble('🎉 *rolling happily!*');
    triggerEmotion('celebrate');
    tapBB8Sound();
    dot.className = 'busy';
    ws.send(JSON.stringify({ type: 'user_message', text: t }));
    save('me', t);
    return;
  }
  if (lower.includes('happy beep') || lower.includes('beep buddy') || lower.includes('beeps buddy')) {
    showBubble('🎵 *happy beeping!*');
    triggerEmotion('happy');
    // Play extra happy sounds
    for (let i = 0; i < 3; i++) {
      setTimeout(() => tapBB8Sound(), i * 600);
    }
    dot.className = 'busy';
    ws.send(JSON.stringify({ type: 'user_message', text: t }));
    save('me', t);
    return;
  }

  ws.send(JSON.stringify({ type: 'user_message', text: t }));
  dot.className = 'busy';
  save('me', t);
}

function stripEmoji(t) { return t.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E0}-\u{1F1FF}\u{1F900}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu,'').trim(); }

// ═══ SPEECH ═══
let rec = null;
const mic = document.getElementById('mic');
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  rec = new SR(); rec.lang = 'en-US'; rec.interimResults = false; rec.continuous = false;
  rec.onresult = (e) => { const t = e.results[0][0].transcript; document.getElementById('input').value = t; sendMe(); }; // tricky: correct ref below
  rec.onend = () => mic.classList.remove('active');
  rec.onerror = () => mic.classList.remove('active');
}
mic.addEventListener('click', () => {
  if (!rec) return;
  if (mic.classList.contains('active')) { mic.classList.remove('active'); rec.stop(); }
  else { mic.classList.add('active'); rec.start(); }
});

function speak(t) {
  const clean = t.replace(/[^\w\s.,!?'"@#$%^&*()\-=+\[\]{}|;:<>\/~`]/g,'').trim();
  // Play R2-D2 beeps based on text length
  playBB8Sound(clean.length);
  // Show text in bubble instead
  showBubble(clean);
  speakAnimate(true);
  setTimeout(() => speakAnimate(false), Math.min(clean.length * 80, 4000));
}

// ═══ CAMERA ═══
let camStream = null;
let camActive = false;
const camBtn = document.getElementById('cam');
const camVideo = document.createElement('video');
camVideo.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;object-fit:cover;z-index:2;opacity:0;transition:opacity .4s;pointer-events:none';
camVideo.setAttribute('playsinline','');
camVideo.setAttribute('autoplay','');
container.appendChild(camVideo);

camBtn.addEventListener('click', async () => {
  if (camActive) { camBtn.style.background = 'rgba(108,99,255,.2)'; camBtn.textContent = '📷'; hideCam(); return; }
  camBtn.textContent = '⏳';
  try {
    camStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment', width: { ideal: 640 }, height: { ideal: 480 } }, audio: false });
    camVideo.srcObject = camStream;
    camVideo.style.opacity = '0.3';
    await camVideo.play();
    showBubble('📷 Say cheese! Tap 📷 again to capture what I see.');
    camBtn.style.background = 'rgba(255,68,68,.4)';
    camBtn.textContent = '📸';
    camActive = true;
  } catch (e) {
    showBubble('📷 Camera access denied! Check permissions.');
    camBtn.textContent = '📷';
  }
});

function hideCam() {
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  camVideo.style.opacity = '0';
  camActive = false;
}

function captureAndSend() {
  if (!camStream) { showBubble('📷 Tap 📷 first to open camera!'); return; }
  const c = document.createElement('canvas');
  c.width = camVideo.videoWidth || 640;
  c.height = camVideo.videoHeight || 480;
  const ctx = c.getContext('2d');
  ctx.drawImage(camVideo, 0, 0);
  const b64 = c.toDataURL('image/jpeg', 0.6).split(',')[1];
  hideCam();
  camBtn.textContent = '📷';
  camBtn.style.background = 'rgba(108,99,255,.2)';
  showBubble('📷 BB-8 is looking...');
  dot.className = 'busy';
  ws.send(JSON.stringify({ type: 'camera_image', image: b64 }));
}

// Tap the camera preview to capture
camVideo.addEventListener('click', captureAndSend);
// Or long-press the cam button to capture
camBtn.addEventListener('dblclick', captureAndSend);

// ═══ UI ═══
const input = document.getElementById('input');
function sendMe() {
  const t = input.value.trim();
  if (!t) return;
  send(t);
  input.value = '';
}
document.getElementById('send').addEventListener('click', sendMe);
input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMe(); });

// ═══ HISTORY ═══
function save(r, t) {
  try {
    const h = JSON.parse(localStorage.getItem('ch') || '[]');
    h.push({ r, t, time: Date.now() });
    if (h.length > 100) h.splice(0, h.length - 100);
    localStorage.setItem('ch', JSON.stringify(h));
  } catch {}
}
document.getElementById('hbtn').addEventListener('click', () => {
  const p = document.getElementById('hpanel');
  const h = JSON.parse(localStorage.getItem('ch') || '[]');
  document.getElementById('hlist').innerHTML = h.reverse().map(e => `
    <div class="hentry"><div class="q">${e.r === 'me' ? '🧑' : '📎'}</div><div class="a">${e.t.substring(0, 200)}</div><div class="t">${new Date(e.time).toLocaleString()}</div></div>
  `).join('');
  p.classList.add('open');
});
document.getElementById('chide').addEventListener('click', () => document.getElementById('hpanel').classList.remove('open'));

// ═══ RESIZE ═══
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labeler.setSize(window.innerWidth, window.innerHeight);
  updateBounds();
});

// ═══ ANIMATE ═══
function animate() {
  requestAnimationFrame(animate);
  if (mixer) mixer.update(0.016);
  updateRoaming();

  // ── Antenna sway + blinking light ──
  if (clippy && clippy.userData.antennaGroup) {
    const ant = clippy.userData.antennaGroup;
    ant.rotation.z = Math.sin(movePhase * 1.5) * 0.12;
    ant.rotation.x = Math.cos(movePhase * 1.2) * 0.08;
  }
  if (clippy && clippy.userData.antennaLight) {
    const light = clippy.userData.antennaLight;
    // Cycle through colors
    const colors = [0xffffff, 0xff4444, 0x44ff44, 0x44aaff, 0xffdd44];
    const idx = Math.floor(movePhase * 4) % colors.length;
    if (light.material.color.getHex() !== colors[idx]) {
      light.material.color.setHex(colors[idx]);
    }
  }

  renderer.render(scene, camera);
  labeler.render(scene, camera);
}

// ═══ INIT ═══
updateBounds();
buildClippy();
connect();
animate();
console.log('📎 Clippy loaded!');
</script>
