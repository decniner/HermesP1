<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Clippy 3D — AI Assistant</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:radial-gradient(ellipse at center,#1a1a2e 0%,#0a0a15 100%);font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#fff;user-select:none;-webkit-user-select:none}
#three-container{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;touch-action:none}
#ui-overlay{position:fixed;bottom:0;left:0;right:0;z-index:10;pointer-events:none}
#chat-bar{display:flex;gap:8px;padding:12px 16px 28px;align-items:center;pointer-events:auto;background:linear-gradient(transparent,rgba(10,10,21,.85) 40%)}
#chat-input{flex:1;height:44px;border-radius:22px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);padding:0 18px;font-size:15px;color:#fff;outline:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);transition:border-color .2s}
#chat-input:focus{border-color:rgba(108,99,255,.5)}
#chat-input::placeholder{color:rgba(255,255,255,.3)}
#mic-btn,#send-btn{width:44px;height:44px;border-radius:50%;border:none;background:rgba(108,99,255,.2);color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center}
#mic-btn:active,#send-btn:active{transform:scale(.9)}
#mic-btn.listening{background:rgba(255,68,68,.4);animation:pulse 1s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,68,68,.4)}70%{box-shadow:0 0 0 12px transparent}to{box-shadow:0 0 0 0 transparent}}
#speech-bubble{position:fixed;top:15vh;left:10%;right:10%;z-index:5;pointer-events:none;text-align:center;opacity:0;transition:opacity .4s}
#speech-bubble.show{opacity:1}
#speech-bubble .bubble{display:inline-block;background:rgba(255,255,255,.1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);border-radius:20px;padding:16px 24px;font-size:15px;line-height:1.5;max-width:100%;text-shadow:0 1px 4px rgba(0,0,0,.5);pointer-events:auto}
#status-dot{position:fixed;top:16px;right:16px;z-index:20;width:10px;height:10px;border-radius:50%;background:#555;transition:background .3s}
#status-dot.connected{background:#00c853;box-shadow:0 0 8px #00c853}
#status-dot.thinking{background:#ffd600;animation:pulse 1.2s infinite}
#status-dot.error{background:#ff1744}
.history-btn{position:fixed;top:14px;left:14px;z-index:20;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#fff;padding:6px 12px;font-size:12px;cursor:pointer}
.history-panel{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);display:none;overflow-y:auto;padding:60px 20px 20px}
.history-panel.open{display:block}
.history-panel h2{font-size:18px;margin-bottom:16px;color:#6c63ff}
.history-entry{margin-bottom:16px;background:rgba(255,255,255,.04);border-radius:10px;padding:12px}
.history-entry .q{font-size:13px;color:#aaa;margin-bottom:4px}
.history-entry .a{font-size:13px;color:#fff;line-height:1.4}
.history-entry .time{font-size:10px;color:#555;margin-top:4px}
.close-history{position:absolute;top:14px;right:16px;background:none;border:none;color:#fff;font-size:24px;cursor:pointer}
</style>
</head>
<body>

<div id="three-container"></div>

<div id="speech-bubble"><div class="bubble" id="bubble-text">Click Clippy or tap the mic to chat!</div></div>

<div id="ui-overlay">
  <div id="chat-bar">
    <button id="mic-btn" title="Voice input">🎤</button>
    <input id="chat-input" type="text" placeholder="Ask Clippy anything..." autocomplete="off">
    <button id="send-btn" title="Send">➤</button>
  </div>
</div>

<div id="status-dot"></div>
<button class="history-btn" id="history-btn">📋 History</button>

<div class="history-panel" id="history-panel">
  <button class="close-history" id="close-history">&times;</button>
  <h2>💬 Conversation History</h2>
  <div id="history-list"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.168.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.168.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════════
const CONFIG = {
  clippyUrl: 'https://raw.githubusercontent.com/decniner/HermesP1/main/public/clippy.glb',
  wsUrl: 'wss://stocks-routers-alive-wireless.trycloudflare.com',
  roamSpeed: 0.3,
  roamRadius: 2.5,
  emotions: {
    idle:       { clip: 0, bubble: '🤔' },
    happy:      { clip: 1, bubble: '😊' },
    curious:    { clip: 2, bubble: '🤨' },
    thinking:   { clip: 3, bubble: '🤔' },
    oops:       { clip: 4, bubble: '😅' },
    celebrate:  { clip: 5, bubble: '🎉' },
  }
};

// ═══════════════════════════════════════════════════════════════
// THREE.JS SCENE
// ═══════════════════════════════════════════════════════════════
const container = document.getElementById('three-container');
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 1.5, 5);
camera.lookAt(0, 0.8, 0);

const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

// Lighting
const ambient = new THREE.AmbientLight(0x404060, 0.6);
scene.add(ambient);
const mainLight = new THREE.DirectionalLight(0xffffff, 2);
mainLight.position.set(3, 5, 4);
scene.add(mainLight);
const fillLight = new THREE.DirectionalLight(0x8888ff, 0.8);
fillLight.position.set(-3, 1, 2);
scene.add(fillLight);
const backLight = new THREE.DirectionalLight(0xff8888, 0.4);
backLight.position.set(0, 0, -4);
scene.add(backLight);
const rimLight = new THREE.DirectionalLight(0x6c63ff, 0.6);
rimLight.position.set(0, -1, 3);
scene.add(rimLight);

// Ground glow ring
const ringGeo = new THREE.RingGeometry(0.6, 1.0, 64);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x6c63ff, transparent: true, opacity: 0.15, side: THREE.DoubleSide });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = -Math.PI / 2;
ring.position.y = -0.6;
scene.add(ring);

// ═══════════════════════════════════════════════════════════════
// CLIPPY MODEL
// ═══════════════════════════════════════════════════════════════
let clippy, mixer, actions = {};
let currentEmotion = 'idle';
let roamTarget = new THREE.Vector3();
let roaming = true;
let dragOffset = new THREE.Vector3();
let isDragging = false;

const loader = new GLTFLoader();
loader.load(
  CONFIG.clippyUrl,
  (gltf) => {
    clippy = gltf.scene;
    clippy.scale.set(1, 1, 1);
    clippy.position.set(0, -0.5, 0);
    scene.add(clippy);

    // Mixer + animations
    if (gltf.animations && gltf.animations.length > 0) {
      mixer = new THREE.AnimationMixer(clippy);
      gltf.animations.forEach((clip, i) => {
        const action = mixer.clipAction(clip);
        action.setLoop(THREE.LoopRepeat, Infinity);
        actions[`clip${i}`] = action;
        if (i === 0) action.play();
      });
    }

    // If no animations, create abstract floating bob
    setTimeout(setRoamTarget, 500);
  },
  undefined,
  (err) => {
    console.warn('GLB load failed, using fallback geometry');
    createFallbackClippy();
  }
);

// ── Fallback if model fails ──────────────────────────────────
function createFallbackClippy() {
  const group = new THREE.Group();

  // Body — rounded box
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 0.6, 0.6),
    new THREE.MeshStandardMaterial({ color: 0xffcc00, metalness: 0.1, roughness: 0.6 })
  );
  body.position.y = 0.3;
  group.add(body);

  // Head
  const head = new THREE.Mesh(
    new THREE.SphereGeometry(0.35, 24, 24),
    new THREE.MeshStandardMaterial({ color: 0xffcc00, metalness: 0.1, roughness: 0.6 })
  );
  head.position.y = 0.85;
  group.add(head);

  // Eyes
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0x000000 });
  const eye = (x) => {
    const e = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 12), eyeMat);
    e.position.set(x, 0.9, 0.3);
    return e;
  };
  group.add(eye(-0.12));
  group.add(eye(0.12));

  // Eyebrows (paperclip style)
  const browMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
  const brow = (x) => {
    const b = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.02, 0.02), browMat);
    b.position.set(x, 1.0, 0.3);
    return b;
  };
  group.add(brow(-0.12));
  group.add(brow(0.12));

  // Smile (arc of small spheres)
  const smileMat = new THREE.MeshBasicMaterial({ color: 0x333333 });
  for (let a = -0.6; a <= 0.6; a += 0.25) {
    const dot = new THREE.Mesh(new THREE.SphereGeometry(0.015, 6, 6), smileMat);
    dot.position.set(a, 0.78 - Math.abs(a) * 0.15, 0.35);
    group.add(dot);
  }

  clippy = group;
  clippy.position.set(0, -0.5, 0);
  scene.add(clippy);
  setTimeout(setRoamTarget, 500);
}

// ── Roaming ──────────────────────────────────────────────────
function setRoamTarget() {
  const angle = Math.random() * Math.PI * 2;
  const dist = 0.3 + Math.random() * CONFIG.roamRadius;
  roamTarget.set(Math.cos(angle) * dist, -0.3 + Math.random() * 0.6, Math.sin(angle) * dist * 0.5);
  if (!roaming) setTimeout(setRoamTarget, 3000);
}

function updateRoaming() {
  if (!clippy || !roaming || isDragging) return;
  clippy.position.lerp(roamTarget, 0.02);
  const lookTarget = new THREE.Vector3(0, 0.5, 0);
  clippy.lookAt(lookTarget);
  if (clippy.position.distanceTo(roamTarget) < 0.1) setRoamTarget();

  // Glow ring follows
  ring.position.x = clippy.position.x;
  ring.position.z = clippy.position.z;
}

// ── Touch / Drag ─────────────────────────────────────────────
let touchPos = { x: 0, y: 0 };

renderer.domElement.addEventListener('touchstart', (e) => {
  const touch = e.touches[0];
  touchPos.x = touch.clientX;
  touchPos.y = touch.clientY;
}, { passive: true });

renderer.domElement.addEventListener('touchmove', (e) => {
  if (!clippy) return;
  isDragging = true;
  const touch = e.touches[0];
  const dx = (touch.clientX - touchPos.x) / window.innerWidth * 4;
  const dy = -(touch.clientY - touchPos.y) / window.innerHeight * 3;
  clippy.position.x += dx;
  clippy.position.y = Math.max(-0.5, clippy.position.y + dy);
  clippy.position.z += dx * 0.5;
  ring.position.x = clippy.position.x;
  ring.position.z = clippy.position.z;
  touchPos.x = touch.clientX;
  touchPos.y = touch.clientY;
}, { passive: true });

renderer.domElement.addEventListener('touchend', () => {
  if (isDragging) {
    isDragging = false;
    setRoamTarget();
  } else {
    // Tap → random animation
    triggerEmotion(['happy', 'curious', 'celebrate'][Math.floor(Math.random() * 3)]);
  }
}, { passive: true });

// Mouse support for desktop testing
renderer.domElement.addEventListener('mousedown', (e) => {
  touchPos.x = e.clientX;
  touchPos.y = e.clientY;
});
renderer.domElement.addEventListener('mousemove', (e) => {
  if (e.buttons !== 1 || !clippy) return;
  isDragging = true;
  const dx = (e.clientX - touchPos.x) / window.innerWidth * 4;
  const dy = -(e.clientY - touchPos.y) / window.innerHeight * 3;
  clippy.position.x += dx;
  clippy.position.y = Math.max(-0.5, clippy.position.y + dy);
  ring.position.x = clippy.position.x;
  ring.position.z = clippy.position.z;
  touchPos.x = e.clientX;
  touchPos.y = e.clientY;
});
renderer.domElement.addEventListener('mouseup', () => {
  if (isDragging) { isDragging = false; setRoamTarget(); }
  else triggerEmotion(['happy', 'curious', 'celebrate'][Math.floor(Math.random() * 3)]);
});

// ═══════════════════════════════════════════════════════════════
// ANIMATION ENGINE
// ═══════════════════════════════════════════════════════════════
function triggerEmotion(emotion, text) {
  if (!CONFIG.emotions[emotion]) emotion = 'idle';
  currentEmotion = emotion;
  const e = CONFIG.emotions[emotion];

  // Switch animation if mixer available
  if (mixer && Object.keys(actions).length > 0) {
    Object.values(actions).forEach(a => a.stop());
    const key = `clip${e.clip}`;
    if (actions[key]) actions[key].play();
  }

  // Temporary scale bounce
  if (clippy) {
    clippy.scale.set(1.15, 1.15, 1.15);
    setTimeout(() => { if (clippy) clippy.scale.set(1, 1, 1); }, 300);
  }

  // Show emoji in bubble
  const bubble = document.getElementById('speech-bubble');
  const bubbleText = document.getElementById('bubble-text');
  if (text) {
    bubbleText.textContent = text;
  } else {
    bubbleText.textContent = e.bubble;
  }
  bubble.classList.add('show');
  clearTimeout(bubble._timeout);
  bubble._timeout = setTimeout(() => bubble.classList.remove('show'), text ? 5000 : 1200);
}

function triggerEmotionFromText(text) {
  const lower = text.toLowerCase();
  if (lower.includes('🎉') || lower.includes('amazing') || lower.includes('great job') || lower.includes('well done')) return triggerEmotion('celebrate', text);
  if (lower.includes('😊') || lower.includes('happy') || lower.includes('awesome') || lower.includes('love')) return triggerEmotion('happy', text);
  if (lower.includes('🤔') || lower.includes('hmm') || lower.includes('think') || lower.includes('wonder') || lower.includes('maybe')) return triggerEmotion('thinking', text);
  if (lower.includes('😅') || lower.includes('oops') || lower.includes('sorry') || lower.includes('mistake') || lower.includes('error') || lower.includes('fail')) return triggerEmotion('oops', text);
  if (lower.includes('🤨') || lower.includes('curious') || lower.includes('interesting') || lower.includes('tell me') || lower.includes('how') || lower.includes('why') || lower.includes('what')) return triggerEmotion('curious', text);
  triggerEmotion('happy', text);
}

// ═══════════════════════════════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════════════════════════════
let ws = null;
const statusDot = document.getElementById('status-dot');

function connectWebSocket() {
  if (ws && ws.readyState === WebSocket.OPEN) return;
  ws = new WebSocket(CONFIG.wsUrl);

  ws.onopen = () => {
    statusDot.className = 'connected';
    showBubble('✨ Clippy is connected!');
  };

  ws.onmessage = (e) => {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'clippy_message' && data.text) {
        speakText(data.text);
        triggerEmotionFromText(data.text);
        saveHistory('assistant', data.text);
      }
    } catch {}
  };

  ws.onclose = () => {
    statusDot.className = 'error';
    setTimeout(connectWebSocket, 3000);
  };

  ws.onerror = () => { statusDot.className = 'error'; };
}

function sendMessage(text) {
  if (!text) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) {
    showBubble('⚠️ Not connected to server. Tap me instead!');
    return;
  }
  ws.send(JSON.stringify({ type: 'user_message', text }));
  statusDot.className = 'thinking';
  saveHistory('user', text);
}

// ═══════════════════════════════════════════════════════════════
// SPEECH
// ═══════════════════════════════════════════════════════════════
let recognition = null;
let isListening = false;
const micBtn = document.getElementById('mic-btn');

function initSpeechRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { micBtn.style.display = 'none'; return; }
  recognition = new SR();
  recognition.lang = 'en-US';
  recognition.interimResults = false;
  recognition.continuous = false;

  recognition.onresult = (e) => {
    const text = e.results[0][0].transcript;
    document.getElementById('chat-input').value = text;
    sendMessage(text);
    stopListening();
  };
  recognition.onend = () => stopListening();
  recognition.onerror = () => stopListening();
}

function toggleListening() {
  if (!recognition) return;
  if (isListening) { stopListening(); return; }
  isListening = true;
  micBtn.classList.add('listening');
  recognition.start();
}

function stopListening() {
  isListening = false;
  micBtn.classList.remove('listening');
  try { recognition.stop(); } catch {}
}

function speakText(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 1.0;
  u.pitch = 1.2;
  u.volume = 1;
  u.onstart = () => { statusDot.className = 'thinking'; };
  u.onend = () => { statusDot.className = 'connected'; };
  window.speechSynthesis.speak(u);
}

function showBubble(text) {
  const bubble = document.getElementById('speech-bubble');
  const bubbleText = document.getElementById('bubble-text');
  bubbleText.textContent = text;
  bubble.classList.add('show');
  clearTimeout(bubble._timeout);
  bubble._timeout = setTimeout(() => bubble.classList.remove('show'), 3000);
}

// ═══════════════════════════════════════════════════════════════
// CHAT HISTORY (localStorage)
// ═══════════════════════════════════════════════════════════════
const HISTORY_KEY = 'clippy_history';

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch { return []; }
}

function saveHistory(role, text) {
  const h = loadHistory();
  h.push({ role, text, time: new Date().toISOString() });
  if (h.length > 100) h.splice(0, h.length - 100);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(h));
}

function renderHistory() {
  const h = loadHistory();
  const list = document.getElementById('history-list');
  list.innerHTML = h.reverse().map(e => `
    <div class="history-entry">
      <div class="q">${e.role === 'user' ? '🧑 You' : '🤖 Clippy'}</div>
      <div class="a">${e.text.substring(0, 300)}</div>
      <div class="time">${new Date(e.time).toLocaleString()}</div>
    </div>
  `).join('');
}

document.getElementById('history-btn').addEventListener('click', () => {
  renderHistory();
  document.getElementById('history-panel').classList.add('open');
});
document.getElementById('close-history').addEventListener('click', () => {
  document.getElementById('history-panel').classList.remove('open');
});

// ═══════════════════════════════════════════════════════════════
// UI EVENTS
// ═══════════════════════════════════════════════════════════════
document.getElementById('send-btn').addEventListener('click', () => {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (text) { sendMessage(text); input.value = ''; }
});
document.getElementById('chat-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('send-btn').click();
});
micBtn.addEventListener('click', toggleListening);

// ═══════════════════════════════════════════════════════════════
// RESIZE
// ═══════════════════════════════════════════════════════════════
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ═══════════════════════════════════════════════════════════════
// RENDER LOOP
// ═══════════════════════════════════════════════════════════════
function animate() {
  requestAnimationFrame(animate);
  if (mixer) mixer.update(0.016);
  updateRoaming();
  renderer.render(scene, camera);
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
initSpeechRecognition();
connectWebSocket();
animate();

console.log('📎 Clippy 3D loaded!');
</script>
</body>
</html>
