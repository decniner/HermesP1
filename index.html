<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>⚪ BB-8 — Astromech Droid</title>

<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{width:100%;height:100%;overflow:hidden;background:radial-gradient(ellipse at center,#1a1a2e 0%,#0a0a15 100%);font-family:-apple-system,BlinkMacSystemFont,sans-serif;color:#fff;user-select:none;-webkit-user-select:none}

#container{position:fixed;top:0;left:0;width:100vw;height:100vh;z-index:0;touch-action:none}

#ui{position:fixed;bottom:0;left:0;right:0;z-index:10;pointer-events:none}

#bar{display:flex;gap:4px;padding:10px 10px 24px;align-items:center;pointer-events:auto;background:linear-gradient(transparent,rgba(10,10,21,.85) 40%)}

#input{flex:1;height:38px;border-radius:19px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);padding:0 16px;font-size:14px;color:#fff;outline:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px)}

#input:focus{border-color:rgba(108,99,255,.5)}

#input::placeholder{color:rgba(255,255,255,.3)}

#mic,#send{width:38px;height:38px;border-radius:50%;border:none;background:rgba(108,99,255,.2);color:#fff;font-size:16px;cursor:pointer;flex-shrink:0;transition:all .2s;display:flex;align-items:center;justify-content:center}

#mic:active,#send:active{transform:scale(.9)}

#mic.active{background:rgba(255,68,68,.4);animation:pulse 1s infinite}

@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,68,68,.4)}70%{box-shadow:0 0 0 12px transparent}to{box-shadow:0 0 0 0 transparent}}

#bubble-wrap{position:fixed;z-index:5;pointer-events:none;transition:opacity .3s;opacity:0}

#bubble-wrap.show{opacity:1}

#bubble{background:rgba(255,255,255,.12);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:14px 18px;font-size:14px;line-height:1.5;max-width:75vw;text-shadow:0 1px 3px rgba(0,0,0,.5);position:relative;margin:0}

#bubble::after{content:'';position:absolute;bottom:-8px;left:24px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-top:8px solid rgba(255,255,255,.12)}

#dot{position:fixed;top:16px;right:16px;z-index:20;width:10px;height:10px;border-radius:50%;background:#555;transition:background .3s}

#dot.on{background:#00c853;box-shadow:0 0 8px #00c853}

#dot.busy{background:#ffd600;animation:pulse 1.2s infinite}

#dot.err{background:#ff1744}

.hbtn{position:fixed;top:14px;left:14px;z-index:20;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:10px;color:#fff;padding:6px 12px;font-size:12px;cursor:pointer}

.hpanel{position:fixed;top:0;left:0;width:100%;height:100%;z-index:100;background:rgba(0,0,0,.8);backdrop-filter:blur(12px);display:none;overflow-y:auto;padding:60px 20px 20px}

.hpanel.open{display:block}

.hpanel h2{font-size:18px;margin-bottom:16px;color:#6c63ff}

.hentry{margin-bottom:12px;background:rgba(255,255,255,.04);border-radius:10px;padding:12px}

.hentry .q{font-size:13px;color:#aaa;margin-bottom:4px}

.hentry .a{font-size:13px;color:#fff}

.hentry .t{font-size:10px;color:#555;margin-top:4px}

.hentry.copied{background:rgba(108,99,255,0.25)!important;transition:background 0s}

.hentry{cursor:pointer}

.chide{position:absolute;top:14px;right:16px;background:none;border:none;color:#fff;font-size:24px;cursor:pointer}

</style>

</head>

<body>



<div id="container"></div>

<div id="bubble-wrap"><div id="bubble"></div></div>

<div id="dot"></div>

<button class="hbtn" id="hbtn">📋</button>



<div id="ui">

  <div id="bar">

    <button id="cam" style="width:38px;height:38px;border-radius:50%;border:none;background:rgba(108,99,255,.2);color:#fff;font-size:16px;cursor:pointer;flex-shrink:0">📷</button>
    <button id="skinbtn" style="width:38px;height:38px;border-radius:50%;border:none;background:rgba(108,99,255,.2);color:#fff;font-size:16px;cursor:pointer;flex-shrink:0">🎨</button>
    <button id="mic">🎤</button>

    <input id="input" type="text" placeholder="Ask BB-8..." autocomplete="off">

    <button id="send">➤</button>

  </div>

</div>

<div id="roamTimer" style="position:fixed;bottom:70px;left:50%;transform:translateX(-50%);z-index:15;color:rgba(255,255,255,0.25);font-size:10px;font-family:monospace;pointer-events:none;transition:opacity 0.3s"></div>



<div class="hpanel" id="hpanel">

  <button class="chide" id="chide">&times;</button>

  <h2>💬 History</h2>

  <div id="hlist"></div>

</div>



<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/renderers/CSS2DRenderer.js"></script>



<script>

// ═══ CONFIG ═══

const CONFIG = {

  wsUrl: 'wss://presenting-programming-farming-afternoon.trycloudflare.com',

  roamSpeed: 0.3,

  roamRadius: 2.5,

};



// ═══ SCENE ═══

const container = document.getElementById('container');

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);

camera.position.set(0, 1.6, 5.5);

camera.lookAt(0, 0.6, 0);



const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });

renderer.setSize(window.innerWidth, window.innerHeight);

renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

renderer.toneMapping = THREE.ACESFilmicToneMapping;

renderer.toneMappingExposure = 1.2;

container.appendChild(renderer.domElement);



// CSS2D overlay for speech bubble

const labeler = new THREE.CSS2DRenderer();

labeler.setSize(window.innerWidth, window.innerHeight);

labeler.domElement.style.position = 'fixed';

labeler.domElement.style.top = '0';

labeler.domElement.style.left = '0';

labeler.domElement.style.pointerEvents = 'none';

labeler.domElement.style.zIndex = '1';

container.appendChild(labeler.domElement);



// Lighting

scene.add(new THREE.AmbientLight(0x404060, 0.6));

const mkLight = (c, p, i) => { const l = new THREE.DirectionalLight(c, i); l.position.set(p[0], p[1], p[2]); scene.add(l); };

mkLight(0xffffff, [3,5,4], 2);

mkLight(0x8888ff, [-3,1,2], 0.8);

mkLight(0xff8888, [0,0,-4], 0.4);

mkLight(0x6c63ff, [0,-1,3], 0.6);



// Ground glow

const ring = new THREE.Mesh(

  new THREE.RingGeometry(0.4, 0.7, 64),

  new THREE.MeshBasicMaterial({ color: 0x6c63ff, transparent: true, opacity: 0.12, side: THREE.DoubleSide })

);

ring.rotation.x = -Math.PI / 2;

ring.position.y = -0.3;

scene.add(ring);



// ═══ BUILD CLIPPY (procedural paperclip) ═══

let clippy, mixer, actions = {};

let currentEmotion = 'idle';

let roamTarget = new THREE.Vector3();

let roaming = true;

let isDragging = false;

let touchPos = { x: 0, y: 0 };

let bubbleObj = null; // CSS2D bubble element



// ═══ SKIN SYSTEM ═══
let currentSkin = 0;
const skins = [
  { name:'Pearl White',   body:'#f5f0eb', panel:'#ee7722', stripe:'#d4cdc4', darkPanel:'#3a3a3a' },
  { name:'Space Black',   body:'#0a0a0a', panel:'#2a2a2a', stripe:'#1a1a1a', darkPanel:'#444' },
  { name:'Ferrari Red',   body:'#1a0505', panel:'#dc0000', stripe:'#990000', darkPanel:'#661111' },
  { name:'Gold Chrome',   body:'#f5e6c8', panel:'#d4a017', stripe:'#b8860b', darkPanel:'#8b6914' },
  { name:'Midnight Blue', body:'#0a0a2e', panel:'#2255cc', stripe:'#1a3a8a', darkPanel:'#112266' },
  { name:'Stormtrooper',  body:'#ffffff', panel:'#cccccc', stripe:'#999999', darkPanel:'#666' },
  { name:'Forest Green',  body:'#0a1a0a', panel:'#2d8a2d', stripe:'#1a5c1a', darkPanel:'#0f3f0f' },
];

function rebuildBB8(skinIdx) {
  currentSkin = skinIdx % skins.length;
  const skin = skins[currentSkin];
  document.getElementById('skinbtn').textContent = ['🎨','🌑','🔥','🥇','🔵','⚪','🌿'][currentSkin];

  // Properly dispose old BB-8
  if (clippy) {
    clippy.traverse(child => {
      if (child.isMesh) {
        child.geometry && child.geometry.dispose();
        if (child.material) {
          if (Array.isArray(child.material)) child.material.forEach(m => { m.map && m.map.dispose(); m.dispose(); });
          else { child.material.map && child.material.map.dispose(); child.material.dispose(); }
        }
      }
    });
    scene.remove(clippy);
    // Remove bubble element from DOM
    if (bubbleObj && bubbleObj.element && bubbleObj.element.parentNode) {
      bubbleObj.element.parentNode.removeChild(bubbleObj.element);
    }
    // Clean up props
    if (activeProps) activeProps.forEach(p => p.meshes.forEach(m => { scene.remove(m); m.geometry && m.geometry.dispose(); m.material && m.material.dispose(); }));
    activeProps = [];
    clippy = null;
    bubbleObj = null;
  }
  buildClippyWithSkin(skin);
}

function cycleSkin() {
  rebuildBB8(currentSkin + 1);
}

// ══════════════════════════════════════════
//  BB-8 BUILDER
// ══════════════════════════════════════════

function buildClippyWithSkin(skin) {
  // ── Body texture ──
  function makeBodyTexture() {
    const c = document.createElement('canvas');
    c.width = 512; c.height = 256;
    const ctx = c.getContext('2d');

    ctx.fillStyle = skin.body;
    ctx.fillRect(0, 0, 512, 256);

    ctx.fillStyle = skin.panel;
    ctx.beginPath(); ctx.ellipse(256, 180, 130, 50, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(90, 130, 45, 55, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(420, 130, 35, 45, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(256, 200, 150, 30, 0, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#999';
    ctx.beginPath(); ctx.ellipse(90, 132, 22, 32, 0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(422, 130, 18, 28, -0.2, 0, Math.PI * 2); ctx.fill();

    ctx.fillStyle = '#666';
    ctx.fillRect(200, 200, 60, 6); ctx.fillRect(200, 210, 55, 4);

    ctx.strokeStyle = skin.darkPanel;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, 128); ctx.lineTo(512, 128); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(80, 0); ctx.lineTo(80, 256); ctx.stroke();

    ctx.fillStyle = skin.stripe;
    const bolts = [[50,100],[150,90],[300,85],[400,95],[470,110],[30,150]];
    bolts.forEach(([x,y]) => { ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI * 2); ctx.fill(); });

    // Copy first column → last column for seamless UV wrap
    const img = ctx.getImageData(0, 0, 512, 256);
    for (let y = 0; y < 256; y++) {
      for (let c = 0; c < 4; c++) {
        img.data[(511 + y * 512) * 4 + c] = img.data[(0 + y * 512) * 4 + c];
      }
    }
    ctx.putImageData(img, 0, 0);

    return new THREE.CanvasTexture(c);
  }

  // ── Head texture ──
  function makeHeadTexture() {
    const c = document.createElement('canvas');
    c.width = 256; c.height = 128;
    const ctx = c.getContext('2d');

    ctx.fillStyle = skin.body;
    ctx.fillRect(0, 0, 256, 128);

    ctx.fillStyle = skin.panel;
    ctx.fillRect(50, 38, 50, 6);
    ctx.fillRect(160, 20, 5, 25); ctx.fillRect(172, 20, 5, 25); ctx.fillRect(184, 20, 5, 25);

    ctx.fillStyle = skin.stripe;
    ctx.beginPath(); ctx.ellipse(128, 10, 40, 8, 0, 0, Math.PI * 2); ctx.fill();

    return new THREE.CanvasTexture(c);
  }

  // ── Materials ──
  const white = new THREE.MeshStandardMaterial({ color: 0xf0f0f0, metalness: 0.3, roughness: 0.2 });
  const whiteShiny = new THREE.MeshStandardMaterial({ color: 0xf5f5f5, metalness: 0.5, roughness: 0.15 });
  const orange = new THREE.MeshStandardMaterial({ color: 0xee7722, metalness: 0.2, roughness: 0.4 });
  const silver = new THREE.MeshStandardMaterial({ color: 0xbbbbbb, metalness: 0.8, roughness: 0.15 });
  const eyeBlack = new THREE.MeshBasicMaterial({ color: 0x222222 });
  const glowMat = new THREE.MeshBasicMaterial({ color: 0x44aaff });

  // ── Textures ──
  const bodyTex = makeBodyTexture();
  bodyTex.wrapS = bodyTex.wrapT = THREE.RepeatWrapping;
  bodyTex.repeat.set(1, 1);
  bodyTex.offset.x = -0.015; // slight offset to hide UV seam
  const bodyMat = new THREE.MeshStandardMaterial({ map: bodyTex, roughness: 0.3, metalness: 0.1 });
  const bodySphere = new THREE.Mesh(new THREE.SphereGeometry(0.48, 48, 48), bodyMat);
  bodySphere.position.y = 0.02;
  bodySphere.name = 'bodySphere';

  const headTex = makeHeadTexture();
  headTex.wrapS = headTex.wrapT = THREE.RepeatWrapping;
  const headMat = new THREE.MeshStandardMaterial({ map: headTex, roughness: 0.3, metalness: 0.1 });
  const headDome = new THREE.Mesh(new THREE.SphereGeometry(0.28, 32, 32, 0, Math.PI * 2, 0, Math.PI / 1.9), headMat);
  headDome.position.set(0, 0.50, 0.02);
  headDome.name = 'headDome';

  // Head rim
  const rim = new THREE.Mesh(new THREE.TorusGeometry(0.27, 0.01, 8, 32),
    new THREE.MeshStandardMaterial({ color: 0xbbbbbb, metalness: 0.8, roughness: 0.15 }));
  rim.position.set(0, 0.32, 0.02);

  // Eyes
  const eL = new THREE.Mesh(new THREE.SphereGeometry(0.09, 14, 14), eyeBlack);
  eL.position.set(-0.13, 0.52, 0.26); eL.scale.set(1, 0.85, 0.4);
  const rL = new THREE.Mesh(new THREE.TorusGeometry(0.085, 0.012, 8, 16), silver);
  rL.position.set(-0.13, 0.52, 0.28);

  const eR = new THREE.Mesh(new THREE.SphereGeometry(0.065, 14, 14), eyeBlack);
  eR.position.set(0.18, 0.44, 0.26); eR.scale.set(1, 0.85, 0.4);
  const rR = new THREE.Mesh(new THREE.TorusGeometry(0.06, 0.01, 8, 16), silver);
  rR.position.set(0.18, 0.44, 0.28);

  // Small rectangle below left eye
  const rect = new THREE.Mesh(new THREE.BoxGeometry(0.035, 0.02, 0.005), silver);
  rect.position.set(-0.13, 0.45, 0.28);

  // Antenna
  const antennaGroup = new THREE.Group();
  antennaGroup.position.set(0, 0.68, -0.04); antennaGroup.name = 'antenna';
  const antBase = new THREE.Mesh(new THREE.CylinderGeometry(0.008, 0.012, 0.15, 6),
    new THREE.MeshStandardMaterial({ color: 0x111111 }));
  antBase.position.y = 0.075; antennaGroup.add(antBase);
  const antTip = new THREE.Mesh(new THREE.SphereGeometry(0.018, 8, 8),
    new THREE.MeshBasicMaterial({ color: 0xffffff }));
  antTip.position.y = 0.16; antTip.name = 'antennaLight'; antennaGroup.add(antTip);

  // Glow ring
  const ring = new THREE.Mesh(new THREE.RingGeometry(0.1, 0.15, 32),
    new THREE.MeshBasicMaterial({ color: 0x4444ff, transparent: true, opacity: 0.15, side: THREE.DoubleSide }));
  ring.rotation.x = -Math.PI / 2; ring.position.y = -0.3;

  // ── Assemble ──
  const g = new THREE.Group();
  const parts = [bodySphere, headDome, rim, eL, rL, eR, rR, rect, antennaGroup, ring];
  parts.forEach(p => g.add(p));

  clippy = g;
  clippy.scale.set(0.6, 0.6, 0.6);
  clippy.position.set(0, -0.05, 0);
  scene.add(clippy);
  clippy.userData = {
    mouth: null, tail: null, tailTip: null, legs: [],
    antennaLight: antTip, antennaGroup: antennaGroup,
    bodySphere: bodySphere, headDome: headDome
  };

  // ── Speech bubble ──
  const div = document.createElement('div');
  div.id = 'bb';
  div.textContent = 'Hi!';
  div.style.cssText = 'background:linear-gradient(135deg,rgba(20,20,40,0.92),rgba(30,25,55,0.92));backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(108,99,255,0.25);border-radius:16px;padding:10px 14px;color:#f0f0f0;font-size:13px;line-height:1.5;max-width:200px;max-height:calc(100vh - 160px);overflow-y:auto;text-align:left;pointer-events:auto;cursor:pointer;transition:opacity 0.3s,transform 0.2s;opacity:0;box-shadow:0 8px 32px rgba(0,0,0,0.4),0 0 0 1px rgba(108,99,255,0.1);font-family:-apple-system,BlinkMacSystemFont,sans-serif;letter-spacing:0.01em';
  bubbleObj = new THREE.CSS2DObject(div);
  bubbleObj.position.set(0, 1.7, 0);
  scene.add(bubbleObj);
  div.addEventListener('click', function(e) {
    if (this._full) { this.textContent = this._full; this._full = null; this.style.maxWidth = '280px'; }
    e.stopPropagation();
  });

  setTimeout(setRoamTarget, 500);
}

// Initial build
buildClippyWithSkin(skins[0]);
// ── Bubble helper ──

function showBubble(text, fade) {

  if (!bubbleObj) return;

  const el = bubbleObj.element;

  // Reset any custom styles from user message
  el.style.background = '';
  el.style.maxWidth = '200px';
  el.style.transition = fade ? 'opacity 0.6s ease' : 'opacity 0.15s ease';

  const maxLen = 120;

  if (text.length > maxLen) {

    el.textContent = text.substring(0, maxLen) + '... [tap more]';

    el._full = text;

  } else {

    el.textContent = text;

    el._full = null;

  }

  el.style.opacity = '1';

  clearTimeout(el._hide);

}



function clearBubble() {

  if (!bubbleObj) return;

  const el = bubbleObj.element;

  el.style.opacity = '0';

}



// ── Emotion ──

let tailWagPhase = 0;



function triggerEmotion(emotion) {

  if (!clippy) return;

  currentEmotion = emotion;

  const scale = { happy: 1.1, celebrate: 1.15, curious: 1.02, thinking: 1.0, oops: 0.95, idle: 1.0 };

  const s = scale[emotion] || 1;

  clippy.scale.set(s, s, s);

  setTimeout(() => { if (clippy) clippy.scale.set(1, 1, 1); }, 300);

}



function emotionFromText(text) {

  const l = text.toLowerCase();

  if (l.includes('whistle') || l.includes('chirp') || l.includes('bleep') || l.includes('happy') || l.includes('scan') || l.includes('operational') || l.includes('beep') || l.includes('!')) return 'happy';

  if (l.includes('sassy') || l.includes('warble') || l.includes('disagree') || l.includes('grumpy') || l.includes('annoyed')) return 'curious';

  if (l.includes('calculating') || l.includes('processing') || l.includes('query') || l.includes('think') || l.includes('?') || l.includes('analyze')) return 'thinking';

  if (l.includes('panic') || l.includes('scream') || l.includes('danger') || l.includes('alert') || l.includes('emergency') || l.includes('help')) return 'oops';

  if (l.includes('heroic') || l.includes('mission') || l.includes('complete') || l.includes('saved') || l.includes('success')) return 'celebrate';

  return 'happy';

}



// ═══ CLIPPY WALKING + SOUND ═══



let idleTime = 0;

let movePhase = 0;

let walkPhase = 0;

let isPausing = false;

let pauseTimer = 0;

let isSpeaking = false;

let speakPhase = 0;

let lastStep = 0;

let _bounds = { left: -1.5, right: 1.5, top: 1.0, bottom: -0.8 };

let roamCooldown = 0;



// Recalculate visible bounds when screen resizes

function updateBounds() {

  const vFov = camera.fov * Math.PI / 180;

  const dist = Math.abs(camera.position.z);

  const height = 2 * Math.tan(vFov / 2) * dist;

  const width = height * camera.aspect;

  _bounds = {

    left: -width * 0.35,

    right: width * 0.35,

    top: height * 0.35,

    bottom: -height * 0.25,

  };

}



function clampVec(v) {

  v.x = Math.max(_bounds.left, Math.min(_bounds.right, v.x));

  v.y = Math.max(_bounds.bottom, Math.min(_bounds.top, v.y));

}



// ── BB-8 Astromech Chirp & Whistle Sound Generator ──

function playBB8Sound(textLength = 10) { playRandomSound(); }



function setRoamTarget() {

  if (!roaming) return;

  // Variety of movement types
  const moveType = Math.random();
  let tx = 0, tz = 0;
  
  if (moveType < 0.25) {
    // Diagonal dash — fast diagonal movement
    const angle = Math.random() * Math.PI * 2;
    const dist = 1.5 + Math.random() * 1.5;
    tx = Math.cos(angle) * dist * 0.5;
    tz = Math.sin(angle) * dist;
    
  } else if (moveType < 0.40) {
    // Arc / circle path
    const angle = Math.random() * Math.PI * 2;
    const radius = 0.8 + Math.random() * 1.0;
    tx = Math.cos(angle) * radius;
    tz = Math.sin(angle) * radius;
    
  } else if (moveType < 0.55) {
    // Z-axis rush — fast forward or backward
    const dir = Math.random() < 0.5 ? 1 : -1;
    const dist = 1.5 + Math.random() * 1.5;
    tx = (Math.random() - 0.5) * 0.4;
    tz = dir * dist;
    
  } else if (moveType < 0.70) {
    // Side sweep — fast lateral movement
    const dir = Math.random() < 0.5 ? 1 : -1;
    const dist = 0.8 + Math.random() * 0.8;
    tx = dir * dist;
    tz = (Math.random() - 0.5) * 0.6;
    
  } else if (moveType < 0.82) {
    // Zigzag — target that forces direction changes
    const seg = Math.floor(Math.random() * 4);
    const patterns = [[1.0, 0.8], [-1.0, 0.5], [0.5, -1.2], [-0.8, -1.0]];
    tx = patterns[seg][0];
    tz = patterns[seg][1];
    
  } else {
    // Quick turnaround — dash to opposite side
    tx = -(clippy ? clippy.position.x : 0) * 1.5;
    tz = -(clippy ? clippy.position.z : 0) * 1.2;
    if (Math.abs(tx) < 0.3) tx = (Math.random() - 0.5) * 1.0;
    if (Math.abs(tz) < 0.3) tz = (Math.random() < 0.5 ? 1 : -1) * 1.5;
  }

  roamTarget.set(
    Math.max(-0.5, Math.min(0.5, tx)),
    -0.05,
    Math.max(-1.5, Math.min(1.2, tz))
  );

  isPausing = false;
  _lastMoveType = moveType;

}



function speakAnimate(on) {

  isSpeaking = on;

  if (on) speakPhase = 0;

  // When speaking, face camera (rotation.y = 0)

  if (on && clippy) {

    clippy.rotation.y = 0;

  }

}



function updateRoaming() {

  if (!clippy || isDragging) return;

  movePhase += 0.016;

  idleTime += 0.016;



  // ── Speaking animation ──

  if (isSpeaking) {

    speakPhase += 0.016;

    clippy.rotation.y = 0;

    clippy.position.y = -0.2 + Math.sin(speakPhase * 2.5) * 0.015;

    const mouthOpen = 0.5 + Math.sin(speakPhase * 14) * 0.3 + Math.sin(speakPhase * 22) * 0.15;

    if (clippy.userData.mouth) clippy.userData.mouth.scale.y = Math.max(0.3, mouthOpen);

    clampVec(clippy.position);

    ring.position.x = clippy.position.x; ring.position.z = clippy.position.z;

    return;

  }



  const dist = clippy.position.distanceTo(roamTarget);



  // ── Pause at destination ──

  if (dist < 0.12 && !isPausing) {

    isPausing = true; pauseTimer = 0;
    let delay = 3 + Math.random() * 4;
    if (Math.abs(clippy.position.z) > 0.3) delay = 2 + Math.random() * 2; // shorter pause after roll
    window._pauseDuration = delay;

  }

  if (isPausing) {

    pauseTimer += 0.016;

    clippy.position.y = -0.2 + Math.sin(idleTime * 1.6) * 0.025;

    if (clippy.userData.mouth) clippy.userData.mouth.scale.y = 1;

    if (pauseTimer > 5 + Math.random() * 4) setRoamTarget();

    // Update timer
    const timerEl = document.getElementById('roamTimer');
    if (timerEl) {
      const remaining = Math.max(0, (window._pauseDuration || 5) - pauseTimer);
      if (Math.abs(clippy.position.z) > 0.3) {
        timerEl.textContent = `↩ coming back in ${remaining.toFixed(1)}s`;
      } else if (clippy.position.z < -0.1) {
        timerEl.textContent = `→ rolling back in ${remaining.toFixed(1)}s`;
      } else {
        timerEl.textContent = remaining > 0 ? `next move in ${remaining.toFixed(1)}s` : '';
        timerEl.style.opacity = remaining > 0 ? '1' : '0';
      }
    }

    ring.position.x = clippy.position.x; ring.position.z = clippy.position.z;

    return;

  }



  // ── Rush toward target (in a hurry!) ──

  // Fast movement: tighter bounds for screen safety
  const isFar = Math.abs(roamTarget.z) > 0.6 || Math.abs(roamTarget.x) > 0.3;
  const baseSpeed = isFar ? 0.1 : 0.05;
  const speed = baseSpeed + Math.min(dist * 0.015, 0.03);

  const ease = dist < 0.5 ? speed * (2 - speed) : speed;

  clippy.position.x += (roamTarget.x - clippy.position.x) * ease;

  clippy.position.z += (roamTarget.z - clippy.position.z) * ease;

  clippy.position.y += (roamTarget.y - clippy.position.y) * ease * 0.3;



  // ── BB-8 body roll (full revolutions when moving) ──

  if (clippy.userData.bodySphere && clippy.userData.headDome) {

    const body = clippy.userData.bodySphere;
    const head = clippy.userData.headDome;
    
    // Calculate movement direction and distance
    const dx = roamTarget.x - clippy.position.x;
    const dz = roamTarget.z - clippy.position.z;
    const movingDist = Math.sqrt(dx*dx + dz*dz);
    const isFastMove = movingDist > 0.5;
    
    // Racing spin: extremely fast, very obvious revolutions
    const spinMultiplier = isFastMove ? 60 : 20;
    const spinRate = spinMultiplier + movingDist * 40;
    
    // Accumulate rotation for full racing revolutions
    body.rotation.z += dz * 0.016 * spinRate * 3;
    body.rotation.x -= dx * 0.016 * spinRate * 3;
    
    // Head stays perfectly upright — no counter-rotation to avoid clipping
    head.rotation.z = 0;
    head.rotation.x = 0;

  }



    // ── Rubber-band bubble toward screen center ──
    if (bubbleObj && clippy) {
      // Target: above BB-8 but pulled strongly toward center
      const targetX = clippy.position.x * 0.2;  // strong pull to center
      const targetY = 1.8 + Math.abs(clippy.position.z) * 0.2;
      const targetZ = 0;
      // Smooth rubber-band interpolation
      bubbleObj.position.x += (targetX - bubbleObj.position.x) * 0.08;
      bubbleObj.position.y += (targetY - bubbleObj.position.y) * 0.08;
      bubbleObj.position.z += (targetZ - bubbleObj.position.z) * 0.08;
    }

// ── Face direction of travel ──

  const dirX = roamTarget.x - clippy.position.x;

  const dirZ = roamTarget.z - clippy.position.z;

  if (Math.abs(dirX) > 0.01 || Math.abs(dirZ) > 0.01) {

    const targetAngle = Math.atan2(dirX, dirZ);

    let diff = targetAngle - clippy.rotation.y;

    while (diff > Math.PI) diff -= Math.PI * 2;

    while (diff < -Math.PI) diff += Math.PI * 2;

    clippy.rotation.y += diff * 0.03;

  }



  // ── Reset mouth ──

  if (clippy.userData.mouth) clippy.userData.mouth.scale.y = 1;



  // ── Clamp to screen bounds ──

  clampVec(clippy.position);



  // ── Glow ring follows ──

  ring.position.x = clippy.position.x; ring.position.z = clippy.position.z;

}

// ═══ WEBSOCKET ═══

let ws = null;

const dot = document.getElementById('dot');



function connect() {

  ws = new WebSocket(CONFIG.wsUrl);

  ws.onopen = () => { dot.className = 'on'; showBubble('✨ Beep boop! BB-8 unit online!'); };

  ws.onmessage = (e) => {

    try {

      const d = JSON.parse(e.data);

      if (d.type === 'clippy_message' && d.text) {

        dot.className = 'on';

        speak(d.text);

        emotionFromText(d.text);

        showBubble(stripEmoji(d.text));

        save('ai', d.text);

      }

    } catch {}

  };

  ws.onclose = () => { dot.className = 'err'; setTimeout(connect, 3000); };

  ws.onerror = () => { dot.className = 'err'; };

}



function send(t) {

  if (!t || !ws || ws.readyState !== WebSocket.OPEN) { showBubble('⚠️ Not connected...'); return; }

  // Show user's message on screen, fade after 3.5s

  if (bubbleObj) {

    const el = bubbleObj.element;

    el.textContent = '🧑 ' + t.substring(0, 80);

    el.style.opacity = '1';

    el.style.background = 'rgba(30,30,60,0.85)';

  }



  // ── Voice commands ──

  const lower = t.toLowerCase();

  if (lower.includes('roll buddy') || lower.includes('roll') && lower.includes('buddy')) {

    showBubble('🎉 *rolling happily!*');

    triggerEmotion('celebrate');

    tapBB8Sound();

    dot.className = 'busy';

    ws.send(JSON.stringify({ type: 'user_message', text: t }));

    save('me', t);

    return;

  }

  if (lower.includes('happy beep') || lower.includes('beep buddy') || lower.includes('beeps buddy')) {

    showBubble('🎵 *happy beeping!*');

    triggerEmotion('happy');

    // Play extra happy sounds

    for (let i = 0; i < 3; i++) {

      setTimeout(() => tapBB8Sound(), i * 600);

    }

    dot.className = 'busy';

    ws.send(JSON.stringify({ type: 'user_message', text: t }));

    save('me', t);

    return;

  }



  ws.send(JSON.stringify({ type: 'user_message', text: t }));

  dot.className = 'busy';

  save('me', t);

}



function stripEmoji(t) { return t.replace(/[\u{1F600}-\u{1F64F}\u{1F300}-\u{1F5FF}\u{1F680}-\u{1F6FF}\u{1F1E0}-\u{1F1FF}\u{1F900}-\u{1F9FF}\u{2600}-\u{26FF}\u{2700}-\u{27BF}]/gu,'').trim(); }

      const r = 0.2;

      add(new THREE.SphereGeometry(0.025, 8, 8), 0xffee44, Math.cos(a) * r, 0.15 + Math.sin(a) * r * 0.8, Math.sin(a) * r * 0.3);

      add(new THREE.SphereGeometry(0.01, 6, 6), 0xffffff, Math.cos(a) * r * 1.3, 0.15 + Math.sin(a) * r * 0.8, Math.sin(a) * r * 0.3);

    }

  } else if (type === 'pancake') {

    // Pancake stack with butter

    add(new THREE.CylinderGeometry(0.08, 0.09, 0.015, 12), 0xcc8844, 0, -0.06, 0);

    add(new THREE.CylinderGeometry(0.07, 0.08, 0.012, 12), 0xdd9955, 0, -0.04, 0);

    add(new THREE.CylinderGeometry(0.03, 0.03, 0.006, 8), 0xffee66, 0.02, -0.025, 0);

    // Syrup drip

    add(new THREE.SphereGeometry(0.015, 6, 6), 0xcc6633, 0.05, -0.06, 0);

    add(new THREE.SphereGeometry(0.01, 6, 6), 0xcc6633, -0.04, -0.055, 0);

  } else if (type === 'radio') {

    // Radio waves: concentric torus rings

    for (let r = 1; r <= 4; r++) {

      add(new THREE.TorusGeometry(0.04 * r, 0.005, 6, 20), 0x44aaff, 0, 0.25 + r * 0.02, 0);

    }

    // Antenna

    add(new THREE.CylinderGeometry(0.003, 0.003, 0.1, 6), 0xaaaaaa, 0, 0.35, 0);

    add(new THREE.SphereGeometry(0.008, 6, 6), 0xff4444, 0, 0.42, 0);

  } else if (type === 'trail') {

    // Motion trail: dots forming a circle

    for (let i = 0; i < 10; i++) {

      const a = (i / 10) * Math.PI * 2;

      add(new THREE.SphereGeometry(0.02, 6, 6), 0x88ddff, Math.cos(a) * 0.18, 0.02, Math.sin(a) * 0.18);

    }

  } else if (type === 'spin') {

    // Spinning top ring

    add(new THREE.TorusGeometry(0.18, 0.018, 8, 24), 0x44aaff, 0, 0.08, 0);

    add(new THREE.TorusGeometry(0.12, 0.012, 8, 20), 0x66ccff, 0, 0.1, 0);

    add(new THREE.SphereGeometry(0.03, 8, 8), 0x88ddff, 0, 0.15, 0);

  } else if (type === 'doodle') {

    // Doodle: colorful scribble lines

    const cols = [0xff4444, 0x44ff44, 0x4444ff, 0xff44ff, 0xffff44, 0x44ffff];

    for (let i = 0; i < 8; i++) {

      const x = (Math.random() - 0.5) * 0.35;

      const y = (Math.random() - 0.5) * 0.2;

      add(new THREE.SphereGeometry(0.015, 6, 6), cols[i % 6], x, y, 0);

      add(new THREE.SphereGeometry(0.008, 4, 4), 0xffffff, x + 0.01, y + 0.01, 0);

    }

  } else if (type === 'flex') {

    // Flex: arm with bicep curl

    add(new THREE.SphereGeometry(0.04, 8, 8), 0x44aaff, -0.12, 0.15, 0);

    add(new THREE.SphereGeometry(0.05, 10, 10), 0x66ccff, -0.12, 0.22, 0);

    add(new THREE.SphereGeometry(0.03, 8, 8), 0x88ddff, -0.12, 0.28, 0);

    // Sparkles around

    for (let i = 0; i < 5; i++) {

      const a = (i / 5) * Math.PI * 2;

      add(new THREE.SphereGeometry(0.01, 6, 6), 0xffee44, Math.cos(a) * 0.06 - 0.12, 0.22 + Math.sin(a) * 0.06, 0);

    }

  }



  // Store with fade timer

  activeProps.push({ meshes, time: 0 });

}



// Animate and clean up props each frame

function updateProps() {

  for (let i = activeProps.length - 1; i >= 0; i--) {

    const p = activeProps[i];

    p.time += 0.016;

    const life = 3.0; // seconds

    p.meshes.forEach(m => {

      m.position.y += 0.003;

      if (p.time > life * 0.7) {

        m.material.opacity = Math.max(0, 1 - (p.time - life * 0.7) / (life * 0.3));

      }

    });

    if (p.time > life) {

      p.meshes.forEach(m => scene.remove(m));

      activeProps.splice(i, 1);

    }

  }

}



function doRandomTrick() {
  if (isSpeaking || dot.className === 'busy') return; // don't interrupt

  const trick = tricks[Math.random() * tricks.length | 0];

  showBubble(trick.text, true); // fade in slowly
  triggerEmotion(trick.anim);
  spawnProp(trick.prop);

  // Auto-clear bubble after 4s with smooth fade
  clearTimeout(window._trickClear);
  window._trickClear = setTimeout(() => {
    if (bubbleObj) {
      const el = bubbleObj.element;
      if (el._full === null || !el._full) {
        el.style.transition = 'opacity 0.8s ease';
        el.style.opacity = '0';
      }
    }
  }, 4000);

  const count = 2 + Math.random() * 2 | 0;
  for (let i = 0; i < count; i++) {
    setTimeout(() => tapBB8Sound(), i * 500);
  }

}



function animate() {

  requestAnimationFrame(animate);

  if (mixer) mixer.update(0.016);

  updateRoaming();

  updateProps();



  // ── Idle tricks (every 30-45 seconds of inactivity, not while busy) ──

  if (!isSpeaking && !isDragging && clippy && dot.className !== 'busy') {

    idleTrickTimer += 0.016;

    if (idleTrickTimer > trickCooldown) {

      idleTrickTimer = 0;

      trickCooldown = 30 + Math.random() * 15;

      doRandomTrick();

    }

  } else {

    idleTrickTimer = 0;

  }



  // ── Antenna sway + blinking light (only when processing) ──

  if (clippy && clippy.userData.antennaGroup) {

    const ant = clippy.userData.antennaGroup;

    ant.rotation.z = Math.sin(movePhase * 1.5) * 0.12;

    ant.rotation.x = Math.cos(movePhase * 1.2) * 0.08;

  }

  if (clippy && clippy.userData.antennaLight) {

    const light = clippy.userData.antennaLight;

    if (dot.className === 'busy') {

      // Blink rapidly when processing

      const colors = [0xffffff, 0xff4444, 0x44ff44, 0x44aaff, 0xffdd44];

      const idx = Math.floor(movePhase * 8) % colors.length;

      light.material.color.setHex(colors[idx]);

      light.scale.set(1.2, 1.2, 1.2);

      // Play signal sound every ~400ms
      antennaSoundTimer += 0.016;
      if (antennaSoundTimer > 0.4) {
        antennaSoundTimer = 0;
        playAntennaSignal();
      }

      // Signal wave ring around antenna

      if (clippy.userData.antennaGroup && Math.floor(movePhase * 6) % 3 === 0) {

        const antPos = new THREE.Vector3();

        clippy.userData.antennaGroup.getWorldPosition(antPos);

        const wave = new THREE.Mesh(

          new THREE.TorusGeometry(0.02, 0.004, 6, 12),

          new THREE.MeshBasicMaterial({ color: colors[idx], transparent: true, opacity: 0.8 })

        );

        wave.position.copy(antPos);

        wave.position.y += 0.16;

        scene.add(wave);

        // Animate and remove wave

        let t = 0;

        const anim = setInterval(() => {

          t += 0.033;

          const s = 1 + t * 3;

          wave.scale.set(s, s, s);

          wave.material.opacity = Math.max(0, 0.8 - t * 0.6);

          if (t > 1.2) { clearInterval(anim); scene.remove(wave); }

        }, 33);

      }

    } else {

      // Steady white when idle

      light.material.color.setHex(0xffffff);

      light.scale.set(1, 1, 1);

    }

  }



  renderer.render(scene, camera);

  labeler.render(scene, camera);

}



// ═══ INIT ═══

updateBounds();

connect();

animate();

console.log('📎 BB-8 loaded!');

// ── Skin button ──
document.getElementById('skinbtn').addEventListener('click', cycleSkin);



// ═══ BB-8 MP3 SOUND SYSTEM ═══
const BB8_SOUNDS = [];
const SOUND_BASE = '/sounds/';
const SOUND_FILES = [
  'bb2-02','bb8-01','bb8-03','bb8-04','bb8-05','bb8-06','bb8-07','bb8-08',
  'bb8-09','bb8-10','bb8-11','bb8-12','bb8-13','bb8-14','bb8-15','bb8-16',
  'bb8-17','bb8-18','bb8-19','bb8-20','bb8-21','bb8-22','bb8-23','bb8-24',
  'bb8-25','bb8-26','bb8-27','bb8-28','bb8-29','bb8-30','bb8-31','bb8-32'
];
let soundsLoaded = false;
function preloadSounds() {
  if (soundsLoaded) return;
  soundsLoaded = true;
  SOUND_FILES.forEach((name, i) => {
    const audio = new Audio();
    audio.src = SOUND_BASE + name + '.mp3';
    audio.preload = 'auto';
    audio.volume = 0.4;
    BB8_SOUNDS[i] = audio;
  });
}
function playRandomSound() {
  if (BB8_SOUNDS.length === 0) { preloadSounds(); return; }
  const idx = Math.floor(Math.random() * BB8_SOUNDS.length);
  const sound = BB8_SOUNDS[idx];
  if (sound) { sound.currentTime = 0; sound.play().catch(() => {}); }
}
document.addEventListener('click', preloadSounds, { once: true });
document.addEventListener('touchstart', preloadSounds, { once: true });</script>
