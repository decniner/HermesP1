['What is Hermes Agent?',[`
<p><b>Hermes Agent</b> is an open-source AI assistant framework developed by <b>Nous Research</b>. Named after the Greek messenger god (and symbolized by the caduceus ⚕), Hermes is designed to be a long-running, tool-using AI agent that lives on your machine — not in a browser tab.</p>
<p>Unlike a standard chatbot that simply answers questions, Hermes is an <b>agentic system</b>: it has access to tools, persistent memory, a task board, a scheduler, and the ability to spawn sub-agents. It can read and write files, execute terminal commands, search the web, send messages across platforms, generate images, convert text to speech, and much more — all driven by an LLM backend of your choice.</p>
<p>Nous Research built Hermes around a few core principles:</p>
<ul><li><b>Agent-first, not chat-first.</b> Hermes is an agent that happens to chat, not a chat that happens to have tools.</li><li><b>Local and sovereign.</b> Your configuration, memory, skills, and data live on your machine.</li><li><b>Extensible by design.</b> Skills, plugins, custom providers — everything is designed to be extended.</li></ul>
`,`
<p>At its core, Hermes connects an LLM to a rich set of tools through a <b>tool-use loop</b>:</p>
<ul><li>User sends a message → LLM processes it → LLM decides to respond or use a tool → Tool executes → Result fed back → LLM continues or responds</li><li>This loop runs until the task is complete or the turn limit is reached.</li></ul>
<p>Key architectural components:</p>
<ul><li><b>The LLM Backend</b> — Any OpenAI-compatible API (OpenAI, Anthropic, DeepSeek, OpenRouter, local models via Ollama/LM Studio)</li><li><b>Tool System</b> — 20+ built-in tools (terminal, web, files, cron, kanban, delegate, TTS, vision, memory, etc.)</li><li><b>Skills</b> — Reusable procedural knowledge that teaches the agent how to handle specific tasks</li><li><b>Kanban</b> — A durable SQLite-backed task board shared across profiles</li><li><b>Cron</b> — A built-in scheduler for recurring tasks and automation</li><li><b>Gateway</b> — Multi-platform chat interface (Telegram, Discord, WhatsApp, Slack)</li><li><b>Profiles</b> — Isolated agent configurations with separate skills, memory, and connections</li><li><b>Memory</b> — Persistent across sessions via MEMORY.md and USER.md</li></ul>
`,`
<p>Hermes is for developers, system administrators, SREs, power users, and anyone who wants an AI assistant that can actually <i>do</i> things on their machine — not just talk about them.</p>
<ul><li>Automating repetitive tasks</li><li>Monitoring and incident response</li><li>Code generation and review</li><li>Research and data analysis</li><li>Building and deploying software</li><li>Personal productivity automation</li></ul>
`]],
['Installation & Setup',[`
<p>Hermes Agent runs on Windows, macOS, and Linux. Installation is straightforward.</p>
<h2>Requirements</h2>
<ul><li>Python 3.9+ or Node.js 18+</li><li>An OpenAI-compatible API key</li><li>For local models: ~8GB VRAM for 7B models</li></ul>
<h2>Install</h2>
<p><b>pip (recommended):</b></p><pre>pip install hermes-agent</pre>
<p><b>npx:</b></p><pre>npx hermes-agent</pre>
<p><b>From source:</b></p><pre>git clone https://github.com/nousresearch/hermes-agent.git
cd hermes-agent
pip install -e .</pre>
`,`
<h2>First Run</h2>
<pre>hermes</pre>
<p>On first run, Hermes creates <code>~/.hermes/</code> and prompts for an API provider. Run <code>hermes setup</code> to configure later.</p>
<h2>Configuration</h2>
<p>Main config: <code>~/.hermes/config.yaml</code></p>
<ul><li><b>model</b> — Default model, provider, base URL, fallbacks</li><li><b>agent</b> — Max turns, temperature</li><li><b>terminal</b> — Backend, timeout, cwd</li><li><b>display</b> — Streaming, skin</li><li><b>gateway</b> — Platform connections</li></ul>
`,`
<h2>Profiles</h2>
<pre>hermes profile create my-profile</pre>
<p>Each profile has its own <code>config.yaml</code>, <code>SOUL.md</code>, <code>skills/</code>, <code>memories/</code>, and <code>plugins/</code>. Switch with:</p>
<pre>hermes --profile my-profile</pre>
<h2>API Providers</h2>
<pre>model:
  default: deepseek-v4-flash
  provider: deepseek
  base_url: https://api.deepseek.com/v1</pre>
<pre>model:
  default: llama3.3
  provider: custom:ollama
  base_url: http://localhost:11434/v1</pre>
`]],
['The CLI Interface',[`
<p>Hermes presents a rich terminal UI with color, streaming text, spinners, and tool output.</p>
<h2>Basic Usage</h2>
<pre>hermes                    # Interactive session

hermes --continue        # Resume session</pre>
<h2>Slash Commands</h2>
<ul><li><code>/help</code> — List commands</li><li><code>/model</code> — Switch model</li><li><code>/provider</code> — Switch provider</li><li><code>/skin</code> — Change theme</li><li><code>/session</code> — Session info</li><li><code>/reset</code> — Fresh session</li></ul>

<h2>The Tool-Use Loop</h2>
<p>When Hermes uses a tool, a spinner appears with a verb (<i>searching</i>, <i>reading</i>, <i>computing</i>) followed by the tool's output, so you see what the agent is doing at every step.</p>

<p>Skills are Hermes' procedural memory — reusable knowledge that teaches the agent how to handle specific tasks.</p>
<h2>What Skills Can Do</h2>
<ul><li>Teach task execution (code review, data analysis, game development)</li><li>Provide domain knowledge (MQL5 trading, Kubernetes, language learning)</li><li>Define workflows with exact commands, pitfalls, and verification steps</li><li>Store reference files (templates, scripts, configs)</li></ul>

<p>Hermes has persistent memory across sessions, stored as plain Markdown files injected into every turn.</p>

// READER ENGINE — Kindle-style
// ══════════════════════════════════════════════════════════════
let ch=1, pg=0, ui=false, dark=false, fs=17;

function buildToc(){
  let h='<h3>⟐ Contents</h3>';
  C.forEach((c,i)=>{
    if(!c) return;
    h+=`<a onclick="go(${i})" id="t${i}">${i}. ${c[0]}</a>`;
  });
  document.getElementById('toc').innerHTML=h;
}

function show(){
  const c=C[ch]; if(!c) return;
  const p=c[1][pg]; if(!p) return;
  const el=document.getElementById('pg');
  el.innerHTML=`<h1>${ch}. ${c[0]}</h1>`+p;
  el.classList.remove('fade');
  update();
}

function n(dir){
  const c=C[ch]; if(!c) return;
  const nxt=pg+dir;
  if(nxt>=0 && nxt<c[1].length){
    const el=document.getElementById('pg');
    el.classList.add('fade');
    setTimeout(()=>{pg=nxt;show();},200);
    return;
  }
  if(dir>0 && ch<C.length-1 && C[ch+1]){
    ch++;pg=0;
    document.getElementById('pg').classList.add('fade');
    setTimeout(()=>show(),200);
    tocU();
    return;
  }
  if(dir<0 && ch>1 && pg===0){
    ch--;pg=C[ch][1].length-1;
    document.getElementById('pg').classList.add('fade');
    setTimeout(()=>show(),200);
    tocU();
  }
}

function go(n){
  if(n<1||n>=C.length||!C[n])return;
  ch=n;pg=0;
  document.getElementById('pg').classList.add('fade');
  setTimeout(()=>show(),200);
  document.getElementById('toc').classList.remove('open');
  tocU();
}

function update(){
  const c=C[ch]; if(!c) return;
  let d=0,t=0;
  for(let i=1;i<C.length;i++){
    if(!C[i])continue;
    if(i<ch) d+=C[i][1].length;
    else if(i===ch) d+=pg+1;
    t+=C[i][1].length;
  }
  document.getElementById('pi').textContent=`${c[0]} — Page ${pg+1} of ${c[1].length}`;
  document.getElementById('pf').style.width=`${(d/t)*100}%`;
}

function tocU(){
  document.querySelectorAll('#toc a').forEach(a=>a.classList.remove('cur'));
  const el=document.getElementById('t'+ch);
  if(el)el.classList.add('cur');
}

function tB(){
  ui=!ui;
  document.getElementById('top').classList.toggle('hide',!ui);
  document.getElementById('bot').classList.toggle('hide',!ui);
}

function tT(){document.getElementById('toc').classList.toggle('open');}
function tF(){document.getElementById('font').classList.toggle('show');}
function tD(){
  dark=!dark;
  document.body.classList.toggle('dark',dark);
  document.getElementById('dmBtn').textContent=dark?'🌙':'☀';
}
function sF(d){
  fs=Math.max(11,Math.min(28,fs+d));
  document.documentElement.style.setProperty('--fs',fs+'px');
  document.getElementById('font').classList.remove('show');
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')n(1);
  if(e.key==='ArrowLeft')n(-1);
  if(e.key==='t')tT();
  if(e.key===' ')n(1);
});

// Touch swipe
let tx=0;
document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>40)n(dx<0?1:-1);
});

document.getElementById('pg').addEventListener('click',function(e){
  // Don't navigate if user clicked a link
  if(e.target.closest('a')) return;
  // Don't navigate if user selected text
  if(window.getSelection().toString().length > 0) return;
  const w=window.innerWidth;
  if(e.clientX < w*0.3) n(-1);
  else if(e.clientX > w*0.7) n(1);
  else tB();
});
let st=0;
document.getElementById('pg').addEventListener('scroll',()=>{
  if(ui){tB();}
});

buildToc();
show();
</script>
