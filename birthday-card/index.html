<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Happy Birthday Angel!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(160deg, #fce4ec, #f8c8dc, #fce4ec, #f8d0e0);
    font-family: 'Georgia', 'Times New Roman', serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  /* ===== CARD CONTAINER ===== */
  .card-container {
    position: relative;
    z-index: 1;
    width: 360px;
    height: 520px;
    perspective: 1200px;
    cursor: pointer;
  }

  .card {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15),
                0 0 0 1px rgba(212,175,55,0.15);
  }
  .card.open { transform: rotateY(-180deg); }

  .card-front, .card-inside {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    backface-visibility: hidden;
    border-radius: 16px;
    overflow: hidden;
  }

  /* ===== FRONT COVER ===== */
  .card-front {
    background: linear-gradient(160deg, #fce4ec, #fce8ee, #fce4ec);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 28px 20px 20px;
    position: relative;
  }

  /* Subtle watercolor texture overlay */
  .front-texture {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(248,200,220,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(248,200,220,0.3) 0%, transparent 50%),
      radial-gradient(circle at 50% 20%, rgba(255,255,255,0.3) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== TOP TEXT ===== */
  .front-top-line {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 13px;
    color: #4a4a4a;
    letter-spacing: 2px;
    text-transform: lowercase;
    position: relative;
    z-index: 2;
    margin-top: 5px;
  }

  .front-name {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 42px;
    font-weight: bold;
    font-style: italic;
    letter-spacing: 2px;
    position: relative;
    z-index: 2;
    margin-top: 2px;
    background: linear-gradient(180deg, #d4af37 0%, #c9a030 30%, #b8942e 60%, #d4af37 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 20px rgba(212,175,55,0.3), 0 0 40px rgba(212,175,55,0.1);
    filter: drop-shadow(0 1px 2px rgba(212,175,55,0.2));
  }

  .front-sub-line {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 13px;
    color: #4a4a4a;
    letter-spacing: 2px;
    text-transform: lowercase;
    position: relative;
    z-index: 2;
    margin-top: 2px;
  }

  .front-birthday {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 28px;
    font-weight: bold;
    font-style: italic;
    letter-spacing: 3px;
    position: relative;
    z-index: 2;
    margin-top: 0px;
    background: linear-gradient(180deg, #d4af37 0%, #c9a030 30%, #b8942e 60%, #d4af37 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 1px 2px rgba(212,175,55,0.2));
  }

  /* ===== PHOTO FRAME ===== */
  .photo-frame {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -48%);
    width: 200px;
    height: 200px;
    z-index: 2;
    pointer-events: none;
  }

  .photo-inner {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    overflow: hidden;
    border: 3px solid rgba(212,175,55,0.5);
    box-shadow: 0 0 20px rgba(212,175,55,0.15), 0 4px 15px rgba(0,0,0,0.1);
    position: relative;
  }

  .photo-img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .photo-ring {
    position: absolute;
    top: -10px;
    left: -10px;
    width: calc(100% + 20px);
    height: calc(100% + 20px);
    pointer-events: none;
  }

  /* ===== WREATH SVG ===== */
  .wreath-svg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -48%);
    width: 92%;
    height: 92%;
    z-index: 1;
    pointer-events: none;
  }

  /* ===== TAP HINT ===== */
  .tap-hint {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Georgia', serif;
    font-size: 11px;
    color: #a08090;
    letter-spacing: 3px;
    z-index: 3;
    animation: pulse-tap 2s ease-in-out infinite;
  }
  @keyframes pulse-tap {
    0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
  }

  /* ===== GOLD SPARKLE DOTS ===== */
  .gold-dot {
    position: absolute;
    width: 4px; height: 4px;
    background: #d4af37;
    border-radius: 50%;
    z-index: 2;
    pointer-events: none;
    animation: dot-twinkle 2.5s ease-in-out infinite alternate;
  }
  @keyframes dot-twinkle {
    0% { opacity: 0.1; transform: scale(0.5); }
    100% { opacity: 0.9; transform: scale(1.3); }
  }

  /* ===== INSIDE ===== */
  .card-inside {
    background: linear-gradient(160deg, #fff8f0, #ffe8d6, #fff0e0);
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 35px 28px;
    position: relative;
    overflow: hidden;
  }

  .inside-border {
    position: absolute;
    top: 10px; left: 10px; right: 10px; bottom: 10px;
    border: 2px solid rgba(212,175,55,0.25);
    border-radius: 10px;
    pointer-events: none;
  }
  .inside-border-inner {
    position: absolute;
    top: 14px; left: 14px; right: 14px; bottom: 14px;
    border: 1px solid rgba(212,175,55,0.12);
    border-radius: 8px;
    pointer-events: none;
  }

  .inside-decor-top {
    position: absolute;
    top: 18px; left: 0; right: 0;
    text-align: center;
    font-size: 16px;
    color: #d4af37;
    letter-spacing: 6px;
    opacity: 0.4;
  }

  .message {
    text-align: center;
    position: relative;
    z-index: 2;
    opacity: 0;
  }
  .card.open .message {
    animation: message-in 1.2s ease-out 0.4s forwards;
  }
  @keyframes message-in {
    0% { opacity: 0; transform: translateY(30px) scale(0.9); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  .message .greeting {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 28px;
    font-style: italic;
    margin-bottom: 14px;
    display: inline-block;
    background: linear-gradient(180deg, #d4af37, #c9a030);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
  }

  .message .body-text {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 17px;
    line-height: 1.8;
    color: #4a4a4a;
  }

  .message .body-text .highlight {
    display: inline;
    background: linear-gradient(90deg, #ffd70022, #ff6b9d22);
    padding: 0 4px;
    border-radius: 2px;
    font-weight: bold;
    color: #c44e8a;
  }

  .message .rockstar-line {
    margin: 12px 0 8px;
    font-size: 36px;
    display: inline-block;
    background: linear-gradient(180deg, #d4af37, #c9a030, #b8942e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: rockstar-glow 1.8s ease-in-out infinite;
  }
  @keyframes rockstar-glow {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 4px rgba(212,175,55,0.3)); }
    50% { transform: scale(1.12); filter: drop-shadow(0 0 16px rgba(212,175,55,0.5)); }
  }

  .message .signature {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 17px;
    color: #8a6a7a;
    margin-top: 15px;
    font-style: italic;
    letter-spacing: 1px;
  }

  .inside-decor-bottom {
    position: absolute;
    bottom: 18px; left: 0; right: 0;
    text-align: center;
    font-size: 14px;
    color: #d4af37;
    opacity: 0.35;
    letter-spacing: 5px;
  }

  /* ===== BALLOONS ===== */
  .balloon {
    position: absolute;
    font-size: 26px;
    opacity: 0;
  }
  .card.open .balloon {
    animation: balloon-rise var(--dur) ease-in var(--delay) infinite;
  }
  @keyframes balloon-rise {
    0% { transform: translateY(80px) rotate(0deg); opacity: 0; }
    10% { opacity: 0.7; }
    85% { opacity: 0.7; }
    100% { transform: translateY(-220px) rotate(12deg); opacity: 0; }
  }

  /* ===== CONFETTI ===== */
  .confetti-piece {
    position: fixed; width: 10px; height: 10px;
    top: -20px; pointer-events: none; z-index: 100; opacity: 0;
  }
  .confetti-piece.fall {
    animation: confetti-fall var(--fall-dur) ease-in forwards;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ===== FLOATERS ===== */
  .floaters {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 50;
  }
  .floater {
    position: absolute; font-size: 18px; opacity: 0;
    animation: floater-float var(--fd) ease-in-out var(--fdelay) infinite;
  }
  @keyframes floater-float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    20% { opacity: 0.5; transform: translateY(75vh) scale(1); }
    100% { transform: translateY(-10vh) scale(0.4); opacity: 0; }
  }

  /* ===== MUSIC TOGGLE ===== */
  .music-btn {
    position: fixed; bottom: 25px; right: 25px;
    z-index: 200; width: 50px; height: 50px;
    border-radius: 50%;
    border: 2px solid rgba(212,175,55,0.3);
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    color: #d4af37; font-size: 22px;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: all 0.3s ease; touch-action: manipulation;
  }
  .music-btn:hover, .music-btn:active {
    background: rgba(255,255,255,0.25);
    border-color: rgba(212,175,55,0.5);
  }
  .music-btn.muted { opacity: 0.4; }
  .music-btn:not(.muted) .note-icon {
    animation: note-spin 3s linear infinite;
  }
  @keyframes note-spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @media (max-width: 420px) {
    .card-container { width: 300px; height: 460px; }
    .front-name { font-size: 34px; }
    .front-birthday { font-size: 22px; }
    .photo-frame { width: 160px; height: 160px; }
    .photo-ring { top: -8px; left: -8px; width: calc(100% + 16px); height: calc(100% + 16px); }
    .message .greeting { font-size: 24px; }
    .message .body-text { font-size: 15px; }
    .message .rockstar-line { font-size: 28px; }
  }
  @media (max-height: 600px) {
    .card-container { height: 380px; }
    .message .body-text { font-size: 14px; line-height: 1.5; }
  }
</style>
</head>
<body>

<!-- Floaters -->
<div class="floaters" id="floaters"></div>

<!-- Card -->
<div class="card-container" id="cardContainer">
  <div class="card" id="card">

    <!-- ===== FRONT ===== -->
    <div class="card-front">
      <div class="front-texture"></div>

      <div class="front-top-line">to a fantastic</div>
      <div class="front-name">Angel</div>
      <div class="front-sub-line">on your</div>
      <div class="front-birthday">Birthday</div>

      <!-- Circular photo frame -->
      <div class="photo-frame">
        <div class="photo-inner">
          <img src="angel-photo.jpeg" alt="Angel" class="photo-img">
        </div>
        <!-- Gold ornamental ring -->
        <svg class="photo-ring" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
          <circle cx="100" cy="100" r="93" fill="none" stroke="#d4af37" stroke-width="2" opacity="0.6"/>
          <circle cx="100" cy="100" r="97" fill="none" stroke="#d4af37" stroke-width="1" opacity="0.3" stroke-dasharray="3,4"/>
          <!-- Small decorative diamonds around the ring -->
          <polygon points="100,4 103,7 100,10 97,7" fill="#d4af37" opacity="0.5"/>
          <polygon points="100,190 103,193 100,196 97,193" fill="#d4af37" opacity="0.5"/>
          <polygon points="4,100 7,103 10,100 7,97" fill="#d4af37" opacity="0.5"/>
          <polygon points="190,100 193,103 196,100 193,97" fill="#d4af37" opacity="0.5"/>
          <!-- Corner diamonds -->
          <polygon points="30,30 33,33 30,36 27,33" fill="#d4af37" opacity="0.4"/>
          <polygon points="170,30 173,33 170,36 167,33" fill="#d4af37" opacity="0.4"/>
          <polygon points="30,170 33,173 30,176 27,173" fill="#d4af37" opacity="0.4"/>
          <polygon points="170,170 173,173 170,176 167,173" fill="#d4af37" opacity="0.4"/>
        </svg>
      </div>

      <!-- Gold sparkle dots -->
      <div class="gold-dot" style="top:12%;left:18%;animation-delay:0s;"></div>
      <div class="gold-dot" style="top:8%;right:25%;animation-delay:0.6s;width:3px;height:3px;"></div>
      <div class="gold-dot" style="top:20%;left:8%;animation-delay:1.2s;"></div>
      <div class="gold-dot" style="top:15%;right:10%;animation-delay:0.3s;width:3px;height:3px;"></div>
      <div class="gold-dot" style="top:40%;left:5%;animation-delay:0.9s;"></div>
      <div class="gold-dot" style="top:55%;right:4%;animation-delay:1.5s;width:3px;height:3px;"></div>
      <div class="gold-dot" style="top:70%;left:6%;animation-delay:0.4s;"></div>
      <div class="gold-dot" style="top:82%;right:12%;animation-delay:1.1s;width:3px;height:3px;"></div>
      <div class="gold-dot" style="top:78%;left:15%;animation-delay:1.8s;"></div>
      <div class="gold-dot" style="top:45%;right:8%;animation-delay:0.2s;"></div>
      <div class="gold-dot" style="top:25%;left:22%;animation-delay:0.7s;width:3px;height:3px;"></div>
      <div class="gold-dot" style="top:88%;left:40%;animation-delay:1.3s;"></div>
      <div class="gold-dot" style="top:10%;left:45%;animation-delay:0.5s;width:3px;height:3px;"></div>
      <div class="gold-dot" style="top:60%;right:5%;animation-delay:1.6s;"></div>
      <div class="gold-dot" style="top:35%;right:18%;animation-delay:0.8s;"></div>

      <div class="tap-hint">✦ tap to open ✦</div>
    </div>

    <!-- ===== INSIDE ===== -->
    <div class="card-inside">
      <div class="inside-border"></div>
      <div class="inside-border-inner"></div>
      <div class="inside-decor-top">✦ ✦ ✦</div>

      <div class="balloon" style="left:10%;--dur:6s;--delay:0.3s;">🎈</div>
      <div class="balloon" style="left:30%;--dur:7s;--delay:1.2s;">🎈</div>
      <div class="balloon" style="right:25%;--dur:8s;--delay:2.5s;">🎈</div>
      <div class="balloon" style="right:10%;--dur:6.5s;--delay:0.8s;">🎈</div>

      <div class="message">
        <div class="greeting">Dear Angel,</div>
        <div class="body-text">
          Wishing a very happy birthday to the woman who somehow manages to keep <span class="highlight">my brother</span> in line.
        </div>
        <div class="body-text" style="margin-top:8px;">
          You're a
        </div>
        <div class="rockstar-line">🎸 ROCKSTAR! 🎸</div>
        <div class="signature">— Den</div>
      </div>

      <div class="inside-decor-bottom">❤ ✿ ❤</div>
    </div>
  </div>
</div>

<button class="music-btn" id="musicBtn">
  <span class="note-icon">🎵</span>
</button>

<script>
(function() {
  'use strict';

  // ===== FLOATERS =====
  const floatersEl = document.getElementById('floaters');
  const floaterEmojis = ['❤️', '✨', '🌟', '💖', '⭐', '💕', '🌸', '🎉'];
  for (let i = 0; i < 25; i++) {
    const f = document.createElement('div');
    f.className = 'floater';
    f.textContent = floaterEmojis[i % floaterEmojis.length];
    f.style.left = Math.random() * 100 + '%';
    f.style.fontSize = (Math.random() * 14 + 12) + 'px';
    f.style.setProperty('--fd', (Math.random() * 8 + 6) + 's');
    f.style.setProperty('--fdelay', (Math.random() * 10 + 2) + 's');
    floatersEl.appendChild(f);
  }

  // ===== CONFETTI =====
  function spawnConfetti(count) {
    const colors = ['#d4af37', '#ff6b9d', '#c9a030', '#ff4757', '#9b59b6', '#48d1cc', '#e056fd', '#ffdd59'];
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const size = Math.random() * 8 + 5;
      el.style.width = size + 'px';
      el.style.height = size * (Math.random() * 0.6 + 0.5) + 'px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.left = Math.random() * 100 + '%';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.setProperty('--fall-dur', (Math.random() * 2 + 2) + 's');
      el.style.animationDelay = (Math.random() * 0.8) + 's';
      document.body.appendChild(el);
      requestAnimationFrame(() => el.classList.add('fall'));
      setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 5000);
    }
  }

  // ===== BACKGROUND MUSIC (HTML5 Audio) =====
  let audioEl = null;
  let isPlaying = false;

  function initAudio() {
    if (audioEl) return;
    audioEl = new Audio('birthday-music.mp3');
    audioEl.loop = true;
    audioEl.volume = 0.7;
    audioEl.preload = 'auto';
    // Load it so it's ready when tapped
    audioEl.load();
  }

  function playMusic() {
    initAudio();
    if (!audioEl) return;
    audioEl.currentTime = 0;
    audioEl.play().catch(function(e) {
      console.log('Audio play blocked, waiting for user interaction');
    });
    isPlaying = true;
  }

  function stopMusic() {
    if (audioEl) {
      audioEl.pause();
      audioEl.currentTime = 0;
    }
    isPlaying = false;
  }

  // ===== CARD OPEN/CLOSE =====
  const card = document.getElementById('card');
  const container = document.getElementById('cardContainer');
  let isOpen = false;
  let animating = false;

  container.addEventListener('click', function(e) {
    if (animating) return;
    animating = true;

    if (!isOpen) {
      card.classList.add('open');
      isOpen = true;
      if (!isPlaying) { playMusic(); document.getElementById('musicBtn').classList.remove('muted'); }
      setTimeout(() => spawnConfetti(50), 300);
      setTimeout(() => spawnConfetti(35), 800);
      // Second confetti burst at end of song
      setTimeout(() => spawnConfetti(40), 4000);
      setTimeout(() => animating = false, 1300);
    } else {
      card.classList.remove('open');
      isOpen = false;
      setTimeout(() => animating = false, 1300);
    }
  });

  // ===== MUSIC TOGGLE =====
  const musicBtn = document.getElementById('musicBtn');
  musicBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (isPlaying) { stopMusic(); musicBtn.classList.add('muted'); }
    else { playMusic(); musicBtn.classList.remove('muted'); }
  });

  console.log('🎂 Happy Birthday Angel! 🎂');
})();
</script>
</body>
</html>
