<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Happy Birthday Angel!</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(160deg, #fce4ec, #f8c8dc, #fce4ec, #f8d0e0);
    font-family: 'Georgia', 'Times New Roman', serif;
    overflow: hidden;
    touch-action: manipulation;
  }

  /* ===== CARD CONTAINER ===== */
  .card-container {
    position: relative;
    z-index: 1;
    width: 360px;
    height: 520px;
    perspective: 1200px;
    cursor: pointer;
  }

  .card {
    position: relative;
    width: 100%;
    height: 100%;
    transform-style: preserve-3d;
    transition: transform 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15),
                0 0 0 1px rgba(212,175,55,0.15);
  }
  .card.open { transform: rotateY(-180deg); }

  .card-front, .card-inside {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    backface-visibility: hidden;
    border-radius: 16px;
    overflow: hidden;
  }

  /* ===== FRONT COVER ===== */
  .card-front {
    background: linear-gradient(160deg, #fce4ec, #fce8ee, #fce4ec);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 28px 20px 20px;
    position: relative;
  }

  /* Subtle watercolor texture overlay */
  .front-texture {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(248,200,220,0.4) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(248,200,220,0.3) 0%, transparent 50%),
      radial-gradient(circle at 50% 20%, rgba(255,255,255,0.3) 0%, transparent 40%);
    pointer-events: none;
    z-index: 0;
  }

  /* ===== TOP TEXT ===== */
  .front-top-line {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 13px;
    color: #4a4a4a;
    letter-spacing: 2px;
    text-transform: lowercase;
    position: relative;
    z-index: 2;
    margin-top: 5px;
  }

  .front-name {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 42px;
    font-weight: bold;
    font-style: italic;
    letter-spacing: 2px;
    position: relative;
    z-index: 2;
    margin-top: 2px;
    background: linear-gradient(180deg, #d4af37 0%, #c9a030 30%, #b8942e 60%, #d4af37 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 20px rgba(212,175,55,0.3), 0 0 40px rgba(212,175,55,0.1);
    filter: drop-shadow(0 1px 2px rgba(212,175,55,0.2));
  }

  .front-sub-line {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 13px;
    color: #4a4a4a;
    letter-spacing: 2px;
    text-transform: lowercase;
    position: relative;
    z-index: 2;
    margin-top: 2px;
  }

  .front-birthday {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 28px;
    font-weight: bold;
    font-style: italic;
    letter-spacing: 3px;
    position: relative;
    z-index: 2;
    margin-top: 0px;
    background: linear-gradient(180deg, #d4af37 0%, #c9a030 30%, #b8942e 60%, #d4af37 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 1px 2px rgba(212,175,55,0.2));
  }

  /* ===== WREATH SVG ===== */
  .wreath-svg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -48%);
    width: 92%;
    height: 92%;
    z-index: 1;
    pointer-events: none;
  }

  /* ===== TAP HINT ===== */
  .tap-hint {
    position: absolute;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Georgia', serif;
    font-size: 11px;
    color: #a08090;
    letter-spacing: 3px;
    z-index: 3;
    animation: pulse-tap 2s ease-in-out infinite;
  }
  @keyframes pulse-tap {
    0%, 100% { opacity: 0.5; transform: translateX(-50%) scale(1); }
    50% { opacity: 1; transform: translateX(-50%) scale(1.05); }
  }

  /* ===== GOLD SPARKLE DOTS ===== */
  .gold-dot {
    position: absolute;
    width: 4px; height: 4px;
    background: #d4af37;
    border-radius: 50%;
    z-index: 2;
    pointer-events: none;
    animation: dot-twinkle 2.5s ease-in-out infinite alternate;
  }
  @keyframes dot-twinkle {
    0% { opacity: 0.1; transform: scale(0.5); }
    100% { opacity: 0.9; transform: scale(1.3); }
  }

  /* ===== INSIDE ===== */
  .card-inside {
    background: linear-gradient(160deg, #fff8f0, #ffe8d6, #fff0e0);
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 35px 28px;
    position: relative;
    overflow: hidden;
  }

  .inside-border {
    position: absolute;
    top: 10px; left: 10px; right: 10px; bottom: 10px;
    border: 2px solid rgba(212,175,55,0.25);
    border-radius: 10px;
    pointer-events: none;
  }
  .inside-border-inner {
    position: absolute;
    top: 14px; left: 14px; right: 14px; bottom: 14px;
    border: 1px solid rgba(212,175,55,0.12);
    border-radius: 8px;
    pointer-events: none;
  }

  .inside-decor-top {
    position: absolute;
    top: 18px; left: 0; right: 0;
    text-align: center;
    font-size: 16px;
    color: #d4af37;
    letter-spacing: 6px;
    opacity: 0.4;
  }

  .message {
    text-align: center;
    position: relative;
    z-index: 2;
    opacity: 0;
  }
  .card.open .message {
    animation: message-in 1.2s ease-out 0.4s forwards;
  }
  @keyframes message-in {
    0% { opacity: 0; transform: translateY(30px) scale(0.9); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }

  .message .greeting {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 28px;
    font-style: italic;
    margin-bottom: 14px;
    display: inline-block;
    background: linear-gradient(180deg, #d4af37, #c9a030);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 1px;
  }

  .message .body-text {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 17px;
    line-height: 1.8;
    color: #4a4a4a;
  }

  .message .body-text .highlight {
    display: inline;
    background: linear-gradient(90deg, #ffd70022, #ff6b9d22);
    padding: 0 4px;
    border-radius: 2px;
    font-weight: bold;
    color: #c44e8a;
  }

  .message .rockstar-line {
    margin: 12px 0 8px;
    font-size: 36px;
    display: inline-block;
    background: linear-gradient(180deg, #d4af37, #c9a030, #b8942e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: rockstar-glow 1.8s ease-in-out infinite;
  }
  @keyframes rockstar-glow {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 4px rgba(212,175,55,0.3)); }
    50% { transform: scale(1.12); filter: drop-shadow(0 0 16px rgba(212,175,55,0.5)); }
  }

  .message .signature {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: 17px;
    color: #8a6a7a;
    margin-top: 15px;
    font-style: italic;
    letter-spacing: 1px;
  }

  .inside-decor-bottom {
    position: absolute;
    bottom: 18px; left: 0; right: 0;
    text-align: center;
    font-size: 14px;
    color: #d4af37;
    opacity: 0.35;
    letter-spacing: 5px;
  }

  /* ===== BALLOONS ===== */
  .balloon {
    position: absolute;
    font-size: 26px;
    opacity: 0;
  }
  .card.open .balloon {
    animation: balloon-rise var(--dur) ease-in var(--delay) infinite;
  }
  @keyframes balloon-rise {
    0% { transform: translateY(80px) rotate(0deg); opacity: 0; }
    10% { opacity: 0.7; }
    85% { opacity: 0.7; }
    100% { transform: translateY(-220px) rotate(12deg); opacity: 0; }
  }

  /* ===== CONFETTI ===== */
  .confetti-piece {
    position: fixed; width: 10px; height: 10px;
    top: -20px; pointer-events: none; z-index: 100; opacity: 0;
  }
  .confetti-piece.fall {
    animation: confetti-fall var(--fall-dur) ease-in forwards;
  }
  @keyframes confetti-fall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* ===== FLOATERS ===== */
  .floaters {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none; z-index: 50;
  }
  .floater {
    position: absolute; font-size: 18px; opacity: 0;
    animation: floater-float var(--fd) ease-in-out var(--fdelay) infinite;
  }
  @keyframes floater-float {
    0% { transform: translateY(100vh) scale(0); opacity: 0; }
    20% { opacity: 0.5; transform: translateY(75vh) scale(1); }
    100% { transform: translateY(-10vh) scale(0.4); opacity: 0; }
  }

  /* ===== MUSIC TOGGLE ===== */
  .music-btn {
    position: fixed; bottom: 25px; right: 25px;
    z-index: 200; width: 50px; height: 50px;
    border-radius: 50%;
    border: 2px solid rgba(212,175,55,0.3);
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(8px);
    color: #d4af37; font-size: 22px;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    transition: all 0.3s ease; touch-action: manipulation;
  }
  .music-btn:hover, .music-btn:active {
    background: rgba(255,255,255,0.25);
    border-color: rgba(212,175,55,0.5);
  }
  .music-btn.muted { opacity: 0.4; }
  .music-btn:not(.muted) .note-icon {
    animation: note-spin 3s linear infinite;
  }
  @keyframes note-spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  @media (max-width: 420px) {
    .card-container { width: 300px; height: 460px; }
    .front-name { font-size: 34px; }
    .front-birthday { font-size: 22px; }
    .message .greeting { font-size: 24px; }
    .message .body-text { font-size: 15px; }
    .message .rockstar-line { font-size: 28px; }
  }
  @media (max-height: 600px) {
    .card-container { height: 380px; }
    .message .body-text { font-size: 14px; line-height: 1.5; }
  }
</style>
</head>
<body>

<!-- Floaters -->
<div class="floaters" id="floaters"></div>

<!-- Card -->
<div class="card-container" id="cardContainer">
  <div class="card" id="card">

    <!-- ===== FRONT ===== -->
    <div class="card-front">
      <div class="front-texture"></div>

      <div class="front-top-line">to a fantastic</div>
      <div class="front-name">Angel</div>
      <div class="front-sub-line">on your</div>
      <div class="front-birthday">Birthday</div>

      <!-- Wreath SVG -->
      <svg class="wreath-svg" viewBox="0 0 300 400" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Double gold ring frame -->
        <circle cx="150" cy="210" r="120" stroke="#d4af37" stroke-width="0.8" opacity="0.3"/>
        <circle cx="150" cy="210" r="116" stroke="#d4af37" stroke-width="1.5" opacity="0.5"/>
        <circle cx="150" cy="210" r="112" stroke="#d4af37" stroke-width="0.6" opacity="0.2"/>

        <!-- === FLOWERS === -->

        <!-- Top Right: Purple pansy -->
        <g transform="translate(215, 130)">
          <ellipse cx="-6" cy="-4" rx="10" ry="7" fill="#9b59b6" transform="rotate(-30)" opacity="0.9"/>
          <ellipse cx="6" cy="-4" rx="10" ry="7" fill="#8e44ad" transform="rotate(30)" opacity="0.9"/>

        <!-- Right: White anemone -->
        <g transform="translate(258, 200)">

          <line x1="0" y1="0" x2="-3" y2="-5" stroke="#d4af37" stroke-width="0.5"/>

        <!-- Bottom Right: Red berries -->
        <g transform="translate(245, 268)">
          <circle cx="-4" cy="-3" r="4" fill="#dc143c"/>
          <circle cx="4" cy="-2" r="3.5" fill="#e74c3c"/>
          <circle cx="0" cy="4" r="3.5" fill="#c0392b"/>
          <circle cx="-7" cy="2" r="3" fill="#e74c3c"/>
        </g>

        <!-- Bottom Center: Large white anemone -->
        <g transform="translate(150, 320)">
          <ellipse cx="-7" cy="-6" rx="11" ry="7" fill="#fff" transform="rotate(-35)" opacity="0.95"/>
          <ellipse cx="7" cy="-6" rx="11" ry="7" fill="#fefefe" transform="rotate(35)" opacity="0.95"/>
          <ellipse cx="-8" cy="4" rx="10" ry="6" fill="#f8f8f8" transform="rotate(-70)" opacity="0.9"/>
          <ellipse cx="8" cy="4" rx="10" ry="6" fill="#f5f5f5" transform="rotate(70)" opacity="0.9"/>
          <circle cx="0" cy="0" r="4.5" fill="#2c3e50"/>
          <line x1="0" y1="0" x2="-4" y2="-6" stroke="#d4af37" stroke-width="0.6"/>
          <line x1="0" y1="0" x2="4" y2="-5" stroke="#d4af37" stroke-width="0.6"/>
          <line x1="0" y1="0" x2="0" y2="-6" stroke="#d4af37" stroke-width="0.6"/>
          <line x1="0" y1="0" x2="-3" y2="5" stroke="#d4af37" stroke-width="0.6"/>
          <line x1="0" y1="0" x2="3" y2="4" stroke="#d4af37" stroke-width="0.6"/>
        </g>

        <!-- Bottom Left: Magenta flower -->
        <g transform="translate(60, 290)">
          <ellipse cx="-7" cy="-3" rx="10" ry="6" fill="#d81b60" transform="rotate(-25)" opacity="0.85"/>
          <ellipse cx="7" cy="-3" rx="10" ry="6" fill="#c2185b" transform="rotate(25)" opacity="0.85"/>
          <ellipse cx="0" cy="5" rx="8" ry="5" fill="#ad1457" opacity="0.8"/>
          <circle cx="0" cy="0" r="3" fill="#f1c40f"/>
        </g>

        <!-- Left: Purple flower -->
        <g transform="translate(40, 210)">
          <ellipse cx="-4" cy="-5" rx="9" ry="6" fill="#a569bd" transform="rotate(-40)" opacity="0.9"/>
          <ellipse cx="4" cy="-5" rx="9" ry="6" fill="#8e44ad" transform="rotate(40)" opacity="0.9"/>
          <ellipse cx="0" cy="4" rx="7" ry="5" fill="#7d3c98" opacity="0.85"/>
          <circle cx="0" cy="0" r="3" fill="#f39c12"/>
        </g>

        <!-- Top Left: White flower -->
        <g transform="translate(60, 132)">
          <ellipse cx="-5" cy="-4" rx="8" ry="5" fill="#fff" transform="rotate(-30)" opacity="0.9"/>
          <ellipse cx="5" cy="-4" rx="8" ry="5" fill="#fefefe" transform="rotate(30)" opacity="0.9"/>
          <ellipse cx="0" cy="4" rx="7" ry="4" fill="#f5f5f5" opacity="0.85"/>
          <circle cx="0" cy="0" r="2.5" fill="#f1c40f"/>
        </g>

        <!-- === LEAVES === -->

        <!-- Teal leaves - left -->

          <ellipse cx="0" cy="0" rx="12" ry="4" fill="#48d1cc" transform="rotate(-60)" opacity="0.6"/>
          <ellipse cx="0" cy="0" rx="10" ry="3.5" fill="#40c4c0" transform="rotate(-20)" opacity="0.5"/>
        </g>
        <g transform="translate(50, 250)">
          <ellipse cx="0" cy="0" rx="11" ry="4" fill="#48d1cc" transform="rotate(30)" opacity="0.55"/>
          <ellipse cx="0" cy="0" rx="9" ry="3" fill="#40c4c0" transform="rotate(60)" opacity="0.5"/>

        <g transform="translate(265, 195)">
          <ellipse cx="0" cy="0" rx="8" ry="2.5" fill="#b8942e" transform="rotate(-80)" opacity="0.4"/>

        <!-- Gold fern fronds -->

        <circle cx="80" cy="310" r="2.5" fill="#e91e63" opacity="0.45"/>

      </svg>

      <!-- Gold sparkle dots -->
      <div class="gold-dot" style="top:12%;left:18%;animation-delay:0s;"></div>
      <div class="gold-dot" style="top:8%;right:25%;animation-delay:0.6s;width:3px;height:3px;"></div>
      <div class="gold-dot" style="top:20%;left:8%;animation-delay:1.2s;"></div>
      <div class="gold-dot" style="top:15%;right:10%;animation-delay:0.3s;width:3px;height:3px;"></div>
      <div class="gold-dot" style="top:40%;left:5%;animation-delay:0.9s;"></div>
      <div class="gold-dot" style="top:55%;right:4%;animation-delay:1.5s;width:3px;height:3px;"></div>
      <div class="gold-dot" style="top:70%;left:6%;animation-delay:0.4s;"></div>
      <div class="gold-dot" style="top:82%;right:12%;animation-delay:1.1s;width:3px;height:3px;"></div>
      <div class="gold-dot" style="top:78%;left:15%;animation-delay:1.8s;"></div>
      <div class="gold-dot" style="top:45%;right:8%;animation-delay:0.2s;"></div>
      <div class="gold-dot" style="top:25%;left:22%;animation-delay:0.7s;width:3px;height:3px;"></div>
      <div class="gold-dot" style="top:88%;left:40%;animation-delay:1.3s;"></div>
      <div class="gold-dot" style="top:10%;left:45%;animation-delay:0.5s;width:3px;height:3px;"></div>
      <div class="gold-dot" style="top:60%;right:5%;animation-delay:1.6s;"></div>
      <div class="gold-dot" style="top:35%;right:18%;animation-delay:0.8s;"></div>

      <div class="tap-hint">✦ tap to open ✦</div>
    </div>

    <!-- ===== INSIDE ===== -->
    <div class="card-inside">
      <div class="inside-border"></div>
      <div class="inside-border-inner"></div>
      <div class="inside-decor-top">✦ ✦ ✦</div>

      <div class="balloon" style="left:10%;--dur:6s;--delay:0.3s;">🎈</div>
      <div class="balloon" style="left:30%;--dur:7s;--delay:1.2s;">🎈</div>
      <div class="balloon" style="right:25%;--dur:8s;--delay:2.5s;">🎈</div>
      <div class="balloon" style="right:10%;--dur:6.5s;--delay:0.8s;">🎈</div>

      <div class="message">
        <div class="greeting">Dear Angel,</div>
        <div class="body-text">
          Wishing a very happy birthday to the woman who somehow manages to keep <span class="highlight">my brother</span> in line.
        </div>
        <div class="body-text" style="margin-top:8px;">
          You're a
        </div>
        <div class="rockstar-line">🎸 ROCKSTAR! 🎸</div>
        <div class="signature">— Den</div>
      </div>

      <div class="inside-decor-bottom">❤ ✿ ❤</div>
    </div>
  </div>
</div>

<button class="music-btn" id="musicBtn">
  <span class="note-icon">🎵</span>
</button>

<script>
(function() {
  'use strict';

  // ===== FLOATERS =====
  const floatersEl = document.getElementById('floaters');
  const floaterEmojis = ['❤️', '✨', '🌟', '💖', '⭐', '💕', '🌸', '🎉'];
  for (let i = 0; i < 25; i++) {
    const f = document.createElement('div');
    f.className = 'floater';
    f.textContent = floaterEmojis[i % floaterEmojis.length];
    f.style.left = Math.random() * 100 + '%';
    f.style.fontSize = (Math.random() * 14 + 12) + 'px';
    f.style.setProperty('--fd', (Math.random() * 8 + 6) + 's');
    f.style.setProperty('--fdelay', (Math.random() * 10 + 2) + 's');
    floatersEl.appendChild(f);
  }

  // ===== CONFETTI =====
  function spawnConfetti(count) {
    const colors = ['#d4af37', '#ff6b9d', '#c9a030', '#ff4757', '#9b59b6', '#48d1cc', '#e056fd', '#ffdd59'];
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const size = Math.random() * 8 + 5;
      el.style.width = size + 'px';
      el.style.height = size * (Math.random() * 0.6 + 0.5) + 'px';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.left = Math.random() * 100 + '%';
      el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      el.style.setProperty('--fall-dur', (Math.random() * 2 + 2) + 's');
      el.style.animationDelay = (Math.random() * 0.8) + 's';
      document.body.appendChild(el);
      requestAnimationFrame(() => el.classList.add('fall'));
      setTimeout(() => { if (el.parentNode) el.parentNode.removeChild(el); }, 5000);
    }
  }

  // ===== MUSIC (classical music box) =====
  let audioCtx = null;
  let isPlaying = false;
  let musicInterval = null;

  const birthdayMelody = [
    [524, 0.3], [524, 0.3], [588, 0.5], [524, 0.5], [698, 0.5], [660, 0.8],
    [524, 0.3], [524, 0.3], [588, 0.5], [524, 0.5], [784, 0.5], [698, 0.8],
    [524, 0.3], [524, 0.3], [1046, 0.5], [880, 0.5], [698, 0.5], [660, 0.5], [588, 0.5],
    [988, 0.3], [988, 0.3], [880, 0.5], [698, 0.5], [784, 0.5], [698, 0.8]
  ];

  const chordProgression = [
    [262, 'C', 0, 2],  [262, 'C', 2, 1], [349, 'F', 3, 1], [262, 'C', 4, 1], [392, 'G', 5, 1], [392, 'G7', 6, 1],
    [262, 'C', 7, 2],  [262, 'C', 9, 1], [349, 'F', 10, 1], [262, 'C', 11, 1], [392, 'G7', 12, 1], [262, 'C', 13, 1],
    [262, 'C', 14, 2], [262, 'C', 16, 1], [349, 'F', 17, 1], [262, 'C', 18, 1], [392, 'G7', 19, 1], [262, 'C', 20, 1], [392, 'G7', 21, 1],
    [392, 'G7', 22, 2], [392, 'G7', 24, 1], [262, 'C', 25, 1], [349, 'F', 26, 1], [392, 'G7', 27, 1], [262, 'C', 28, 1]
  ];

  const chordIntervals = {
    'C':  [0, 4, 7],
    'F':  [0, 4, 7],
    'G':  [0, 4, 7],
    'G7': [0, 4, 7, 10]
  };

  function playChordChord(rootFreq, chordType, duration) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const intervals = chordIntervals[chordType];
    if (!intervals) return;
    intervals.forEach((semitone, idx) => {
      const freq = rootFreq * Math.pow(2, semitone / 12);
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.035 - idx * 0.007, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.7);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration);
    });
  }

  function playDescant(beatIndex, time) {
    if (!audioCtx) return;
    const descantNotes = {
      1:  [1046, 0.12], 4:  [1174, 0.12], 7:  [1398, 0.12],
      10: [1244, 0.12], 13: [1568, 0.12], 16: [1398, 0.12],
      19: [1046, 0.12], 22: [1174, 0.12], 25: [1398, 0.12],
    };
    if (descantNotes[beatIndex]) {
      const [freq, dur] = descantNotes[beatIndex];
      const now = audioCtx.currentTime + time / 1000;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.025, now + 0.005);
      gain.gain.exponentialRampToValueAtTime(0.001, now + dur);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + dur);
    }
  }

  function playPad(rootFreq, duration) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const notes = [
      rootFreq * 0.5,
      rootFreq * 0.5 * Math.pow(2, 4/12),
      rootFreq * 0.5 * Math.pow(2, 7/12)
    ];
    notes.forEach((freq) => {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0, now);
      gain.gain.linearRampToValueAtTime(0.02, now + 0.5);
      gain.gain.setValueAtTime(0.02, now + duration * 0.6);
      gain.gain.exponentialRampToValueAtTime(0.001, now + duration);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration);
    });
  }

  function playNote(freq, duration) {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;

    // Main music box tine
    const osc1 = audioCtx.createOscillator();
    const gain1 = audioCtx.createGain();
    osc1.type = 'sine';
    osc1.frequency.setValueAtTime(freq, now);
    gain1.gain.setValueAtTime(0, now);
    gain1.gain.linearRampToValueAtTime(0.30, now + 0.006);
    gain1.gain.exponentialRampToValueAtTime(0.001, now + duration * 1.2);
    osc1.connect(gain1);
    gain1.connect(audioCtx.destination);
    osc1.start(now);
    osc1.stop(now + duration + 0.3);

    // Octave shimmer
    const osc2 = audioCtx.createOscillator();
    const gain2 = audioCtx.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(freq * 2.01, now);
    gain2.gain.setValueAtTime(0, now);
    gain2.gain.linearRampToValueAtTime(0.06, now + 0.008);
    gain2.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.8);
    osc2.connect(gain2);
    gain2.connect(audioCtx.destination);
    osc2.start(now);
    osc2.stop(now + duration + 0.3);

    // Metallic fifth harmonic
    const osc3 = audioCtx.createOscillator();
    const gain3 = audioCtx.createGain();
    osc3.type = 'sine';
    osc3.frequency.setValueAtTime(freq * 3.02, now);
    gain3.gain.setValueAtTime(0, now);
    gain3.gain.linearRampToValueAtTime(0.025, now + 0.005);
    gain3.gain.exponentialRampToValueAtTime(0.001, now + duration * 0.5);
    osc3.connect(gain3);
    gain3.connect(audioCtx.destination);
    osc3.start(now);
    osc3.stop(now + duration + 0.2);

    // Mechanical pluck sound
    const bufSize = audioCtx.sampleRate * 0.012;
    const buffer = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 10);
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const gainN = audioCtx.createGain();
    gainN.gain.setValueAtTime(0.04, now);
    gainN.gain.exponentialRampToValueAtTime(0.001, now + 0.012);
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.setValueAtTime(4000, now);
    noise.connect(filter);
    filter.connect(gainN);
    gainN.connect(audioCtx.destination);
    noise.start(now);
  }

  function playMelody() {
    if (!audioCtx) { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    if (audioCtx.state === 'suspended') { audioCtx.resume(); }
    isPlaying = true;
    const tempo = 0.38;

    function playAll() {
      let time = 0;
      let chordIdx = 0;
      let beatCount = 0;
      const padRoot = 262;
      playPad(padRoot, birthdayMelody.reduce((s, [,d]) => s + d, 0) * tempo + 2);

      birthdayMelody.forEach(([freq, dur]) => {
        const noteDur = dur * tempo;
        setTimeout(() => playNote(freq, noteDur), time * 1000);

        if (chordIdx < chordProgression.length) {
          const [rFreq, cType, cStart, cLen] = chordProgression[chordIdx];
          if (beatCount >= cStart + cLen) { chordIdx++; }
          else if (beatCount === cStart) {
            const chordDur = cLen * 0.5 * tempo + 0.4;
            setTimeout(() => playChordChord(rFreq, cType, chordDur), time * 1000);
            chordIdx++;
          }
        }

        playDescant(beatCount, time * 1000);
        time += noteDur + 0.05;
        beatCount++;
      });
      return time;
    }

    let totalTime = playAll() * 1000 + 3000;
    musicInterval = setTimeout(function loopFn() {
      if (!isPlaying) return;
      const t = playAll();
      musicInterval = setTimeout(loopFn, t * 1000 + 3000);
    }, totalTime);
  }

  function stopMusic() {
    isPlaying = false;
    if (musicInterval) { clearTimeout(musicInterval); musicInterval = null; }
  }

  // ===== CARD OPEN/CLOSE =====
  const card = document.getElementById('card');
  const container = document.getElementById('cardContainer');
  let isOpen = false;
  let animating = false;

  container.addEventListener('click', function(e) {
    if (animating) return;
    animating = true;

    if (!isOpen) {
      card.classList.add('open');
      isOpen = true;
      if (!isPlaying) { playMelody(); document.getElementById('musicBtn').classList.remove('muted'); }
      setTimeout(() => spawnConfetti(50), 300);
      setTimeout(() => spawnConfetti(35), 800);
      // Second confetti burst at end of song
      setTimeout(() => spawnConfetti(40), 4000);
      setTimeout(() => animating = false, 1300);
    } else {
      card.classList.remove('open');
      isOpen = false;
      setTimeout(() => animating = false, 1300);
    }
  });

  // ===== MUSIC TOGGLE =====
  const musicBtn = document.getElementById('musicBtn');
  musicBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    if (isPlaying) { stopMusic(); musicBtn.classList.add('muted'); }
    else { playMelody(); musicBtn.classList.remove('muted'); }
  });

  // Pre-warm audio context
  document.addEventListener('touchstart', function init() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }, { once: true });
  document.addEventListener('click', function init() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }, { once: true });

  console.log('🎂 Happy Birthday Angel! 🎂');
})();
</script>
</body>
</html>
